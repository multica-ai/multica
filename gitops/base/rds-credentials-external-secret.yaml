---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: agentfarm-rds-credentials
  namespace: agentfarm
  labels:
    app: agentfarm
    component: database
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: secretstore-aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: agentfarm-rds-credentials
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        host: "{{ .host }}"
        port: "{{ .port }}"
        database: "{{ .database }}"
        username: "{{ .username }}"
        password: "{{ .password }}"
  dataFrom:
  - extract:
      key: agentfarm/rds/credentials
