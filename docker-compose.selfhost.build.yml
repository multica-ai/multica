# Development override: build the backend/web images from the current checkout
# instead of pulling the official GHCR images.

services:
  backend:
    image: multica-backend:dev
    build:
      context: .
      dockerfile: Dockerfile
      # Inject the git commit SHA into the binary at build time so the
      # `/build_info` endpoint can report what's actually running. The
      # deploy workflow sets MULTICA_BUILD_COMMIT to the deployed SHA;
      # local `make` invocations leave it empty and the binary falls
      # back to "unknown" (see main.go).
      args:
        COMMIT: ${MULTICA_BUILD_COMMIT:-unknown}
        VERSION: ${MULTICA_BUILD_VERSION:-dev}

  frontend:
    image: multica-web:dev
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_VERSION: dev
