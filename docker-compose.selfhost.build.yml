# Development override: build the backend/web images from the current checkout
# instead of pulling the official GHCR images.

services:
  backend:
    image: multica-backend:dev
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MULTICA_CASCADE_WEBHOOK_ENABLED: ${MULTICA_CASCADE_WEBHOOK_ENABLED:-}
      MULTICA_GITHUB_WEBHOOK_SECRET_CURRENT: ${MULTICA_GITHUB_WEBHOOK_SECRET_CURRENT:-}
      MULTICA_GITHUB_WEBHOOK_SECRET_PREVIOUS: ${MULTICA_GITHUB_WEBHOOK_SECRET_PREVIOUS:-}
      MULTICA_CASCADE_WORKSPACE_ID: ${MULTICA_CASCADE_WORKSPACE_ID:-}

  frontend:
    image: multica-web:dev
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_VERSION: dev
