version: 2

project_name: multica

builds:
  - id: multica
    main: ./cmd/multica
    dir: server
    binary: multica
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Legacy archive name kept so already-released CLIs (whose `multica update`
  # looks for `multica_{os}_{arch}.{ext}`) can keep self-updating. Remove
  # once those versions are no longer in use.
  - id: legacy
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
  # Versioned archive name used by current CLI / install scripts /
  # desktop bootstrap going forward.
  - id: versioned
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# Homebrew tap publishing intentionally disabled in this fork.
# The upstream `multica-ai/homebrew-tap` repo isn't writable from this
# fork's release workflow, and this fork doesn't yet have its own tap.
# To re-enable: create `TheophilusChinomona/homebrew-tap`, add a
# HOMEBREW_TAP_GITHUB_TOKEN repo secret with write access to it, then
# restore a `brews:` block here pointing at that repo.
