version: 2

project_name: multica

builds:
  - id: cs-workflow
    main: ./cmd/cs-workflow
    dir: server
    binary: cs-workflow
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  # Versioned archive name used by the CLI self-update, install scripts, and
  # desktop bootstrap. project_name stays "multica" (brand), so the CLI
  # archive name is spelled out explicitly here.
  - id: versioned
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "cs-workflow-cli-{{ .Version }}-{{ .Os }}-{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

