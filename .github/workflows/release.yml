          name: digests-web-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-web-merge:
    needs: [verify, docker-web-build]
    runs-on: ubuntu-latest
    concurrency:
      group: release-docker-web-${{ github.ref }}
      cancel-in-progress: true
