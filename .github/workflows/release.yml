name: Release

on:
  push:
    tags:
      # GitHub Actions uses glob patterns here, not regex. Match versioned
      # tags broadly at the trigger layer, then enforce strict semver below.
      - "v*.*.*"
      - "!v*-dirty*"

permissions:
  contents: write
  packages: write

jobs:
  verify:
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      semver: ${{ steps.release_meta.outputs.semver }}
      is_stable: ${{ steps.release_meta.outputs.is_stable }}
      repo_owner_lower: ${{ steps.release_meta.outputs.repo_owner_lower }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag name
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "Triggered by tag: $tag"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must look like vX.Y.Z or vX.Y.Z-suffix; got '$tag'."
            exit 1
          fi
          if [[ "$tag" == *-dirty* ]]; then
            echo "::error::Refusing to release from dirty tag '$tag'."
            exit 1
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "semver=${tag#v}" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          fi
          echo "repo_owner_lower=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      # Tests are run in the separate CI workflow; skip here to keep the
      # release pipeline fast and focused on artifact generation.
      # - name: Run tests
      #   run: cd server && go test ./...

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Multi-arch images are built natively per platform on dedicated runners
  # (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm) and merged into a
  # manifest list. This avoids QEMU emulation, which was making the Next.js
  # arm64 build run for 30+ minutes per release.
  docker-backend-build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute backend image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-backend
          labels: |
            org.opencontainers.image.title=Multica Backend
            org.opencontainers.image.description=Multica self-hosted backend

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          pull: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-backend-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=release-backend-${{ env.PLATFORM_PAIR }}
          build-args: |
            VERSION=${{ needs.verify.outputs.tag_name }}
            COMMIT=${{ github.sha }}
          outputs: type=image,name=ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-backend,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-backend-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-backend-merge:
    needs: [verify, docker-backend-build]
    runs-on: ubuntu-latest
    concurrency:
      group: release-docker-backend-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-backend-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute backend image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-backend
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ needs.verify.outputs.is_stable == 'true' }}
            type=raw,value=${{ needs.verify.outputs.tag_name }}
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-backend@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-backend:${{ steps.meta.outputs.version }}

  docker-web-build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runs-on: ubuntu-latest
          - platform: linux/arm64
            runs-on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs-on }}
    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute web image labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-web
          labels: |
            org.opencontainers.image.title=Multica Web
            org.opencontainers.image.description=Multica self-hosted web frontend

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          pull: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=release-web-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,mode=max,scope=release-web-${{ env.PLATFORM_PAIR }}
          build-args: |
            REMOTE_API_URL=http://backend:8080
            NEXT_PUBLIC_APP_VERSION=${{ needs.verify.outputs.tag_name }}
            NEXT_PUBLIC_BASE_PATH=${{ vars.NEXT_PUBLIC_BASE_PATH }}
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          outputs: type=image,name=ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-web,push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-web-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-web-merge:
    needs: [verify, docker-web-build]
    runs-on: ubuntu-latest
    concurrency:
      group: release-docker-web-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-web-*
          merge-multiple: true

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute web image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-web
          flavor: |
            latest=false
          tags: |
            type=raw,value=latest,enable=${{ needs.verify.outputs.is_stable == 'true' }}
            type=raw,value=${{ needs.verify.outputs.tag_name }}
            type=sha,prefix=sha-

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf 'ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-web@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect \
            ghcr.io/${{ needs.verify.outputs.repo_owner_lower }}/multica-web:${{ steps.meta.outputs.version }}

  helm-release:
    needs: [verify, release, docker-backend-merge, docker-web-merge]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.17.0"

      - name: Update Chart version
        working-directory: helm/multica
        run: |
          sed -i "s/^version:.*/version: ${{ needs.verify.outputs.semver }}/" Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ needs.verify.outputs.semver }}\"/" Chart.yaml

      - name: Update image tags in values.yaml
        working-directory: helm/multica
        run: |
          sed -i 's|tag: "0.0.1"|tag: "${{ needs.verify.outputs.tag_name }}"|g' values.yaml

      - name: Package Helm Chart
        working-directory: helm
        run: |
          helm package multica

      - name: Upload Helm Chart to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: helm
        run: |
          chart_file=$(ls multica-*.tgz | head -n 1)
          echo "Uploading $chart_file to release ${{ needs.verify.outputs.tag_name }}..."
          gh release upload "${{ needs.verify.outputs.tag_name }}" \
            --repo ${{ github.repository }} \
            "$chart_file" \
            --clobber

  sync-to-gitee:
    name: Sync Release To Gitee
    needs:
      - release
      - helm-release
    runs-on: ubuntu-latest
    environment: release-notify
    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries from GitHub
        run: |
          mkdir -p dist
          gh release download "${GITHUB_REF_NAME}" -D dist \
            -p "multica_*" -p "multica-cli-*" -p "checksums.txt" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read GitHub release body
        id: release-meta
        run: |
          BODY=$(gh release view "${GITHUB_REF_NAME}" --json body -q '.body // empty')
          {
            echo 'body<<EOF'
            printf '%s\n' "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Gitee tag if needed
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="linkai0924"
          REPO="multica"
          TAG="${GITHUB_REF_NAME}"
          TARGET_REF=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}?access_token=${GITEE_ACCESS_TOKEN}" \
            | jq -r '.default_branch // empty')

          if [ -z "$TARGET_REF" ]; then
            TARGET_REF=master
          fi

          create_resp=$(rcurl -sS -X POST \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/tags" \
            --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
            --data-urlencode "tag_name=${TAG}" \
            --data-urlencode "refs=${TARGET_REF}")

          if printf '%s' "$create_resp" | jq -e '.name? // .commit?.sha? // empty' > /dev/null; then
            exit 0
          fi

          err=$(printf '%s' "$create_resp" | jq -r '.message // .error // empty')
          if printf '%s' "$err" | grep -Eqi 'exist|已存在'; then
            exit 0
          fi

          printf '%s\n' "$create_resp"
          exit 1
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

      - name: Create or get Gitee release
        id: gitee-release
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="linkai0924"
          REPO="multica"
          TAG="${GITHUB_REF_NAME}"
          TARGET_REF=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}?access_token=${GITEE_ACCESS_TOKEN}" \
            | jq -r '.default_branch // empty')

          if [ -z "$TARGET_REF" ]; then
            TARGET_REF=master
          fi

          existing=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_ACCESS_TOKEN}" \
            || true)

          if [ -n "$existing" ] && [ "$(printf '%s' "$existing" | jq -r '.id // empty')" != "" ]; then
            release_id=$(printf '%s' "$existing" | jq -r '.id')
          else
            created=$(rcurl -sS -X POST \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
              --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
              --data-urlencode "tag_name=${TAG}" \
              --data-urlencode "name=${TAG}" \
              --data-urlencode "body=${BODY}" \
              --data-urlencode "prerelease=false" \
              --data-urlencode "target_commitish=${TARGET_REF}")
            release_id=$(printf '%s' "$created" | jq -r '.id')
            if [ -z "$release_id" ]; then
              printf '%s\n' "$created"
              exit 1
            fi
          fi

          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
        env:
          BODY: ${{ steps.release-meta.outputs.body }}
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

      - name: Upload binaries to Gitee release
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="linkai0924"
          REPO="multica"
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID="${{ steps.gitee-release.outputs.release_id }}"

          attachments=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_ACCESS_TOKEN}" \
            || printf '[]')

          i=0
          for f in dist/*; do
            [ -f "$f" ] || continue
            i=$((i + 1))
            (
              base=$(basename "$f")

              attach_id=$(printf '%s' "$attachments" | jq -r --arg name "$base" '.[] | select(.name == $name) | .id' | head -n 1)
              if [ -n "$attach_id" ]; then
                rcurl -fsS -X DELETE \
                  "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files/${attach_id}?access_token=${GITEE_ACCESS_TOKEN}" \
                  > /dev/null
              fi

              resp=$(rcurl -fsS -X POST \
                "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
                -F "access_token=${GITEE_ACCESS_TOKEN}" \
                -F "file=@${f}")

              url=$(printf '%s' "$resp" | jq -r '.browser_download_url // .download_url // .url // empty')
              if [ -z "$url" ]; then
                url="https://gitee.com/${OWNER}/${REPO}/releases/download/${TAG}/${base}"
              fi

              echo "Uploaded: ${base} -> ${url}"
            ) &
          done

          wait
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
