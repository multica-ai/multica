name: Lilith desktop release

# Build the desktop installers on tag push and publish each platform's
# installers + electron-updater metadata straight to Aliyun OSS from the
# runner that built them.
#
# This workflow is the build half of the Lilith CI loop:
#   Lilith GitLab  ──push-mirror──▶  GitHub (CopilotDemo/multica)
#                                       │
#                                       ▼
#                                   this workflow
#                                       │
#                                       ▼
#                              Aliyun OSS
#                                       ▲
#                                       │
#       Go server `/api/downloads`  ────┘  (proxies version.json,
#                                           short in-process cache —
#                                           see server/internal/handler/downloads.go)
#                                       ▲
#                                       │
#                                  desktop client poll
#
# The pact with this workflow is: every successful tag push results in
# (a) installer binaries at versioned URLs under `<bucket>/downloads/`
# and (b) the per-platform `latest-*.yml` manifests electron-updater
# polls, naming those installers.
#
# Why each build job uploads to OSS directly (no GitHub artifacts):
# GitHub Actions artifact storage has a small quota (1-2 GB) and frees
# deleted artifacts only on a 6-12h recalc, so it cannot be swept clean
# between back-to-back releases of 100MB+ Electron installers — uploads
# eventually fail with "Artifact storage quota has been hit". Pushing
# from each build runner to OSS removes GitHub artifact storage from the
# pipeline entirely, so the quota can never be the failure mode.

# Guard at the workflow level so a fork (other than the Lilith mirror)
# can't accidentally fire this when someone pushes a vX.Y.Z tag. The
# upstream `multica-ai` repo already has its own release.yml; this one
# is for the `CopilotDemo` mirror only.
permissions:
  contents: read

on:
  push:
    tags:
      # The repo's tag history mixes both shapes: `v0.2.32` (with v)
      # and `0.2.33` / `0.2.34` (without). Accept either; the guard job
      # below validates the full shape with a regex.
      - "v[0-9]*.[0-9]*.[0-9]*"
      - "[0-9]*.[0-9]*.[0-9]*"
      # Exclude the dirty-tree marker that `git describe --dirty` adds;
      # they shouldn't be on origin in the first place but defend anyway.
      - "!*-dirty*"

# Opt into Node 24 for any JavaScript-based actions still pinned at Node 20
# (actions/checkout@v4, setup-node@v4, etc.). Node 20 is being removed from
# GitHub runners on 2026-09-16; this avoids the deprecation warning today and
# shakes out any Node 24 compatibility issues before the forced switchover on
# 2026-06-02.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  guard:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Refuse to run on the upstream repo
        if: github.repository_owner == 'multica-ai'
        run: |
          echo "::error::This workflow targets the Lilith mirror; the upstream repo uses release.yml instead."
          exit 1
      - name: Validate + extract tag
        id: meta
        # The `tags:` filter at the top of the file uses fnmatch globs
        # which are coarse — `[0-9]*.[0-9]*.[0-9]*` matches things like
        # `0.foo.bar.baz` too. Tighten with a real regex here, matching
        # the same shape `.gitlab-ci.yml` and `scripts/mirror-to-github.sh`
        # accept: optional leading `v`, then bare semver, optional
        # pre-release suffix.
        run: |
          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must look like vX.Y.Z, X.Y.Z, or X.Y.Z-suffix; got '$tag'."
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build:
    needs: guard
    strategy:
      # fail-fast: false on purpose. Each `latest-*.yml` is per-platform
      # and references only its own installer, and each build job uploads
      # its installer BEFORE its YML — so a platform that fails never
      # leaves a dangling reference, and the healthy platforms should
      # still ship rather than be cancelled. A failed platform simply
      # keeps its previous version until the next release; the others
      # update independently.
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: mac,   arch: arm64, label: darwin-arm64 }
          - { os: windows-latest, target: win,   arch: x64,   label: windows-x64 }
          - { os: ubuntu-latest,  target: linux, arch: x64,   label: linux-x64 }
    runs-on: ${{ matrix.os }}
    env:
      # Apple Developer ID signing + notarization on macOS, with graceful
      # fallback. When all five signing secrets are configured on the repo,
      # the mac matrix entry signs the bundle with a Developer ID Application
      # cert imported from CSC_LINK and submits to notarytool. When any are
      # missing, the values render empty — electron-builder falls back to an
      # ad-hoc signature and package.mjs's `disableMacNotarize` branch
      # (keyed off APPLE_TEAM_ID) skips notarization, so a partially-
      # configured state cannot break the release.
      #
      # Secrets to configure on CopilotDemo/multica
      # (Settings → Secrets and variables → Actions):
      #   CSC_LINK                    — base64 of the .p12 (cert + private key)
      #   CSC_KEY_PASSWORD            — password used when exporting the .p12
      #   APPLE_ID                    — Apple ID email of a team member
      #   APPLE_APP_SPECIFIC_PASSWORD — app-specific password for APPLE_ID
      #   APPLE_TEAM_ID               — 10-char Apple Developer Team ID
      #
      # Every value below is gated on `matrix.target == 'mac'` so Windows
      # and Linux jobs never see Apple credentials, and electron-builder
      # doesn't mistakenly attempt to sign on those platforms.
      CSC_LINK: ${{ matrix.target == 'mac' && secrets.CSC_LINK || '' }}
      CSC_KEY_PASSWORD: ${{ matrix.target == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
      # 'false' preserves the historical ad-hoc fallback when CSC_LINK is
      # not configured; flip to 'true' only when we actually have a cert
      # so electron-builder can locate the identity it just imported into
      # the runner's temporary keychain. Without this guard electron-builder
      # would scan the system keychain for any signing identity and abort
      # with an opaque error on a fresh GitHub-hosted runner.
      CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.target == 'mac' && secrets.CSC_LINK != '' && 'true' || 'false' }}
      APPLE_ID: ${{ matrix.target == 'mac' && secrets.APPLE_ID || '' }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.target == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
      APPLE_TEAM_ID: ${{ matrix.target == 'mac' && secrets.APPLE_TEAM_ID || '' }}

      # ── OSS upload credentials (S3-compatible) ────────────────────────
      # The AWS CLI is pre-installed on every GitHub runner, so it is the
      # uniform cross-platform uploader; ossutil ships no Windows .exe nor
      # a native mac-arm64 binary at the pinned version. OSS speaks S3 over
      # the same RAM keys the Go server already uses for attachments +
      # downloads (server/internal/storage/s3.go, handler/downloads.go).
      AWS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
      # Region must match the endpoint for OSS; the Go server defaults to
      # `oss-cn-shanghai` when unset, so mirror that here.
      AWS_DEFAULT_REGION: ${{ vars.OSS_REGION || 'oss-cn-shanghai' }}
      # aws-cli v2 (>= 2.23) defaults to attaching CRC32 request checksums,
      # which OSS's S3 gateway rejects. Only send/verify checksums when the
      # operation actually requires them.
      AWS_REQUEST_CHECKSUM_CALCULATION: when_required
      AWS_RESPONSE_CHECKSUM_VALIDATION: when_required

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # package.mjs runs `git describe` for version

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Go (needed by apps/desktop/scripts/bundle-cli.mjs)
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package desktop
        run: pnpm --filter @multica/desktop package -- --${{ matrix.target }} --${{ matrix.arch }} --publish never
        shell: bash

      - name: List dist (debug)
        run: ls -la apps/desktop/dist/
        shell: bash

      # ─────────────────────────────────────────────────────────────────
      # OSS layout (single `downloads/` prefix, mirrors what the Go
      # server's DOWNLOADS_OSS_PREFIX env points at):
      #
      #   oss://<bucket>/downloads/latest-mac.yml      ← electron-updater metadata (macOS)
      #   oss://<bucket>/downloads/latest.yml          ← electron-updater metadata (Windows x64)
      #   oss://<bucket>/downloads/latest-linux.yml    ← electron-updater metadata (Linux)
      #   oss://<bucket>/downloads/multica-desktop-v…dmg / .zip / .exe / .AppImage / .deb / .rpm
      #
      # The desktop client (electron-updater, generic provider in
      # apps/desktop/electron-builder.yml) polls the latest-*.yml file
      # for its platform, parses version + sha512 + file list, and on a
      # newer version downloads the installer the YML references.
      # latest-*.yml IS the per-platform manifest — there is no separate
      # JSON manifest to publish.
      #
      # Per-platform atomicity: each object overwrite is atomic on OSS,
      # and we upload this platform's installers BEFORE its latest-*.yml,
      # so a client never polls a YML pointing at an installer that isn't
      # up yet. *.blockmap deltas are skipped — we don't do differential
      # updates and they're dead weight in the bucket.
      # ─────────────────────────────────────────────────────────────────

      - name: Force virtual-hosted addressing for OSS
        # OSS is virtual-hosted (`<bucket>.oss-<region>.aliyuncs.com`); the
        # Go server sets UsePathStyle=false for `oss-…aliyuncs.com`. Pin the
        # same here so the CLI never falls back to path-style.
        shell: bash
        run: aws configure set default.s3.addressing_style virtual

      - name: Upload installers + electron-updater metadata to OSS
        env:
          BUCKET: ${{ vars.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
        shell: bash
        run: |
          set -euo pipefail
          # ossutil took a bare host; the S3 client wants a scheme.
          ep="$OSS_ENDPOINT"
          case "$ep" in
            http://*|https://*) ;;
            *) ep="https://$ep" ;;
          esac
          shopt -s nullglob
          for file in apps/desktop/dist/multica-desktop-* apps/desktop/dist/latest*.yml; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            case "$name" in
              *.blockmap) continue ;;
            esac
            # latest*.yml is the poll target: short cache so a republish is
            # visible within ~1 min. Versioned installers never change once
            # written -> long immutable cache.
            case "$name" in
              latest*.yml) cache="max-age=60" ;;
              *)           cache="max-age=31536000, immutable" ;;
            esac
            echo "::group::Uploading $name"
            aws s3 cp "$file" "s3://$BUCKET/downloads/$name" \
              --endpoint-url "$ep" \
              --cache-control "$cache" \
              --only-show-errors
            echo "::endgroup::"
          done

      - name: Verify each uploaded artifact exists on OSS
        # Confirm every file we just pushed actually landed. Use
        # ListObjectsV2 (s3:ListBucket) rather than HeadObject — the
        # upload RAM user is provisioned read/list under least-privilege
        # and typically lacks HeadObject. A server-side JMESPath equality
        # filter pins an *exact* key match, so a sibling prefix can't
        # masquerade as a hit.
        env:
          BUCKET: ${{ vars.OSS_BUCKET }}
          OSS_ENDPOINT: ${{ vars.OSS_ENDPOINT }}
        shell: bash
        run: |
          set -euo pipefail
          ep="$OSS_ENDPOINT"
          case "$ep" in
            http://*|https://*) ;;
            *) ep="https://$ep" ;;
          esac
          shopt -s nullglob
          for file in apps/desktop/dist/multica-desktop-* apps/desktop/dist/latest*.yml; do
            [ -f "$file" ] || continue
            name=$(basename "$file")
            case "$name" in
              *.blockmap) continue ;;
            esac
            key="downloads/$name"
            found=$(aws s3api list-objects-v2 \
              --bucket "$BUCKET" \
              --prefix "$key" \
              --endpoint-url "$ep" \
              --query "Contents[?Key=='$key'].Key | [0]" \
              --output text)
            if [ "$found" != "$key" ]; then
              echo "::error::MISSING on OSS: s3://$BUCKET/$key"
              exit 1
            fi
            echo "  ✓ $name"
          done

  summary:
    needs: [guard, build]
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        # latest-*.yml IS the manifest in this architecture — the desktop
        # client (electron-updater, generic provider) polls it, parses
        # version + sha512 + file list, and decides whether to download.
        # The YMLs the build matrix uploaded are the per-platform swap
        # points; the names track the matrix above.
        run: |
          tag="${{ needs.guard.outputs.tag }}"
          {
            echo "### Release ${tag} published"
            echo ""
            echo "Clients pick up the new version on their next poll of:"
            echo ""
            echo "- \`<api>/api/downloads/latest-mac.yml\` (macOS)"
            echo "- \`<api>/api/downloads/latest.yml\` (Windows x64)"
            echo "- \`<api>/api/downloads/latest-linux.yml\` (Linux)"
          } >> "$GITHUB_STEP_SUMMARY"
