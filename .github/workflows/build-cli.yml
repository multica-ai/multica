# NOTE: For standard releases, push a tag — .github/workflows/release.yml handles CLI,
# Docker images, Desktop installers, and Helm charts automatically.
# This workflow is kept for ad-hoc manual builds only.
name: Build CLI

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag, branch, or commit SHA to build from"
        required: true
        default: "main"
        type: string
      upload_to_release:
        description: "Upload artifacts to GitHub Release if ref is a tag"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  verify-ref:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.resolve.outputs.ref }}
      is_tag: ${{ steps.resolve.outputs.is_tag }}
      tag_name: ${{ steps.resolve.outputs.tag_name }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve ref
        id: resolve
        shell: bash
        run: |
          input_ref="${{ inputs.ref }}"
          git fetch --tags --force origin "$input_ref" 2>/dev/null || true

          # Try to resolve to a commit
          if git rev-parse --verify "refs/tags/$input_ref" >/dev/null 2>&1; then
            echo "Resolved $input_ref as tag"
            echo "ref=refs/tags/$input_ref" >> "$GITHUB_OUTPUT"
            echo "is_tag=true" >> "$GITHUB_OUTPUT"
            echo "tag_name=$input_ref" >> "$GITHUB_OUTPUT"
            echo "version=${input_ref#v}" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify "refs/remotes/origin/$input_ref" >/dev/null 2>&1; then
            echo "Resolved $input_ref as branch"
            echo "ref=refs/remotes/origin/$input_ref" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            safe_version="${input_ref//\//-}"
            echo "version=$safe_version" >> "$GITHUB_OUTPUT"
          elif git rev-parse --verify "$input_ref" >/dev/null 2>&1; then
            echo "Resolved $input_ref as commit"
            echo "ref=$input_ref" >> "$GITHUB_OUTPUT"
            echo "is_tag=false" >> "$GITHUB_OUTPUT"
            echo "tag_name=" >> "$GITHUB_OUTPUT"
            echo "version=${input_ref:0:7}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Cannot resolve ref: $input_ref"
            exit 1
          fi

  build:
    needs: verify-ref
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-24.04-arm
          - goos: windows
            goarch: amd64
            runner: windows-latest

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.verify-ref.outputs.ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Build binary
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ needs.verify-ref.outputs.version }}
        shell: bash
        run: |
          commit=$(git rev-parse --short HEAD)
          date=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          output="cs-workflow"
          if [ "$GOOS" = "windows" ]; then
            output="cs-workflow.exe"
          fi

          go build \
            -ldflags "-s -w -X main.version=$VERSION -X main.commit=$commit -X main.date=$date" \
            -o "bin/$output" \
            ./cmd/cs-workflow

          echo "Built: server/bin/$output"
          ./bin/$output version || true

      - name: Package archive (Unix)
        if: matrix.goos != 'windows'
        working-directory: server/bin
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.verify-ref.outputs.version }}
        run: |
          archive_name="cs-workflow-cli-${VERSION}-${GOOS}-${GOARCH}.tar.gz"
          tar czf "$archive_name" cs-workflow
          echo "archive_name=$archive_name" >> "$GITHUB_ENV"
          echo "Created archive: $archive_name"

      - name: Package archive (Windows)
        if: matrix.goos == 'windows'
        working-directory: server/bin
        shell: pwsh
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.verify-ref.outputs.version }}
        run: |
          $archive_name = "cs-workflow-cli-${env:VERSION}-${env:GOOS}-${env:GOARCH}.zip"
          Compress-Archive -Path cs-workflow.exe -DestinationPath $archive_name
          Add-Content -Path $env:GITHUB_ENV -Value "archive_name=$archive_name"
          Write-Host "Created archive: $archive_name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cs-workflow-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: server/bin/${{ env.archive_name }}
          if-no-files-found: error
          retention-days: 30

  release:
    needs: [verify-ref, build]
    runs-on: ubuntu-latest
    if: needs.verify-ref.outputs.is_tag == 'true' && inputs.upload_to_release == true
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: cs-workflow-cli-*
          merge-multiple: true

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.verify-ref.outputs.tag_name }}"

          # Ensure release exists (create draft if not)
          if ! gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Creating release for $tag"
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --title "$tag" \
              --generate-notes \
              --draft
          fi

          echo "Uploading artifacts to release $tag"
          gh release upload "$tag" dist/* \
            --repo "${{ github.repository }}" \
            --clobber

          echo "Artifacts uploaded to https://github.com/${{ github.repository }}/releases/tag/$tag"

  sync-to-gitee:
    name: Sync Release To Gitee
    needs:
      - verify-ref
      - release
    runs-on: ubuntu-latest
    if: needs.verify-ref.outputs.is_tag == 'true' && inputs.upload_to_release == true
    environment: release-notify
    steps:
      - uses: actions/checkout@v4

      - name: Download release binaries from GitHub
        run: |
          mkdir -p dist
          gh release download "${{ needs.verify-ref.outputs.tag_name }}" -D dist \
            -p "cs-workflow-cli-*" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read GitHub release body
        id: release-meta
        run: |
          BODY=$(gh release view "${{ needs.verify-ref.outputs.tag_name }}" --json body -q '.body // empty')
          {
            echo 'body<<EOF'
            printf '%s\n' "$BODY"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Gitee tag if needed
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="linkai0924"
          REPO="multica"
          TAG="${{ needs.verify-ref.outputs.tag_name }}"
          TARGET_REF=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}?access_token=${GITEE_ACCESS_TOKEN}" \
            | jq -r '.default_branch // empty')

          if [ -z "$TARGET_REF" ]; then
            TARGET_REF=master
          fi

          create_resp=$(rcurl -sS -X POST \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/tags" \
            --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
            --data-urlencode "tag_name=${TAG}" \
            --data-urlencode "refs=${TARGET_REF}")

          if printf '%s' "$create_resp" | jq -e '.name? // .commit?.sha? // empty' > /dev/null; then
            exit 0
          fi

          err=$(printf '%s' "$create_resp" | jq -r '.message // .error // empty')
          if printf '%s' "$err" | grep -Eqi 'exist|已存在'; then
            exit 0
          fi

          printf '%s\n' "$create_resp"
          exit 1
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

      - name: Create or get Gitee release
        id: gitee-release
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="linkai0924"
          REPO="multica"
          TAG="${{ needs.verify-ref.outputs.tag_name }}"
          TARGET_REF=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}?access_token=${GITEE_ACCESS_TOKEN}" \
            | jq -r '.default_branch // empty')

          if [ -z "$TARGET_REF" ]; then
            TARGET_REF=master
          fi

          existing=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/tags/${TAG}?access_token=${GITEE_ACCESS_TOKEN}" \
            || true)

          if [ -n "$existing" ] && [ "$(printf '%s' "$existing" | jq -r '.id // empty')" != "" ]; then
            release_id=$(printf '%s' "$existing" | jq -r '.id')
          else
            created=$(rcurl -sS -X POST \
              "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases" \
              --data-urlencode "access_token=${GITEE_ACCESS_TOKEN}" \
              --data-urlencode "tag_name=${TAG}" \
              --data-urlencode "name=${TAG}" \
              --data-urlencode "body=${BODY}" \
              --data-urlencode "prerelease=false" \
              --data-urlencode "target_commitish=${TARGET_REF}")
            release_id=$(printf '%s' "$created" | jq -r '.id')
            if [ -z "$release_id" ]; then
              printf '%s\n' "$created"
              exit 1
            fi
          fi

          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
        env:
          BODY: ${{ steps.release-meta.outputs.body }}
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}

      - name: Upload binaries to Gitee release
        run: |
          set -euo pipefail

          rcurl() {
            local max=3 delay=10 i=1
            while [ $i -le $max ]; do
              curl "$@" && return 0
              echo "::warning::curl attempt $i/$max failed, retrying in ${delay}s..."
              sleep $delay
              i=$((i + 1))
            done
            return 1
          }

          OWNER="linkai0924"
          REPO="multica"
          TAG="${{ needs.verify-ref.outputs.tag_name }}"
          RELEASE_ID="${{ steps.gitee-release.outputs.release_id }}"

          attachments=$(rcurl -fsS \
            "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files?access_token=${GITEE_ACCESS_TOKEN}" \
            || printf '[]')

          i=0
          for f in dist/*; do
            [ -f "$f" ] || continue
            i=$((i + 1))
            (
              base=$(basename "$f")

              attach_id=$(printf '%s' "$attachments" | jq -r --arg name "$base" '.[] | select(.name == $name) | .id' | head -n 1)
              if [ -n "$attach_id" ]; then
                rcurl -fsS -X DELETE \
                  "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files/${attach_id}?access_token=${GITEE_ACCESS_TOKEN}" \
                  > /dev/null
              fi

              resp=$(rcurl -fsS -X POST \
                "https://gitee.com/api/v5/repos/${OWNER}/${REPO}/releases/${RELEASE_ID}/attach_files" \
                -F "access_token=${GITEE_ACCESS_TOKEN}" \
                -F "file=@${f}")

              url=$(printf '%s' "$resp" | jq -r '.browser_download_url // .download_url // .url // empty')
              if [ -z "$url" ]; then
                url="https://gitee.com/${OWNER}/${REPO}/releases/download/${TAG}/${base}"
              fi

              echo "Uploaded: ${base} -> ${url}"
            ) &
          done

          wait
        env:
          GITEE_ACCESS_TOKEN: ${{ secrets.GITEE_ACCESS_TOKEN }}
