name: Release (fork)

on:
  push:
    tags:
      - "v*.*.*"
      - "!v*-dirty*"

permissions:
  contents: write
  packages: write

jobs:
  verify:
    if: github.repository_owner != 'multica-ai'
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.release_meta.outputs.tag_name }}
      is_stable: ${{ steps.release_meta.outputs.is_stable }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag name
        id: release_meta
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          echo "Triggered by tag: $tag"
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tags must look like vX.Y.Z or vX.Y.Z-suffix; got '$tag'."
            exit 1
          fi
          if [[ "$tag" == *-dirty* ]]; then
            echo "::error::Refusing to release from dirty tag '$tag'."
            exit 1
          fi
          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          if [[ "$tag" == *-* ]]; then
            echo "is_stable=false" >> "$GITHUB_OUTPUT"
          else
            echo "is_stable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run tests
        run: cd server && go test -race ./...

  goreleaser:
    needs: verify
    if: github.repository_owner != 'multica-ai'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean -f .goreleaser.fork.yml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop:
    needs: goreleaser
    if: github.repository_owner != 'multica-ai'
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux
            archs: --x64 --arm64
          - os: windows-latest
            target: win
            archs: --x64 --arm64
          # Apple Silicon only — a single arch avoids latest-mac.yml collisions
          # from publishing x64 then arm64 in separate electron-builder runs.
          # Squirrel.Mac in-place updates require a Developer ID-signed ZIP;
          # wire CSC_LINK + CSC_KEY_PASSWORD (or a macOS runner keychain cert)
          # plus APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID.
          - os: macos-latest
            target: mac
            archs: --arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rpmbuild (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Clean stale desktop artifacts (macOS)
        if: matrix.target == 'mac'
        working-directory: apps/desktop
        run: rm -rf dist out

      - name: Package Desktop installers (${{ matrix.target }})
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Ad-hoc-sign only when no Developer ID cert is wired into CI.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.CSC_LINK != '' && 'true' || 'false' }}
        shell: bash
        run: >-
          node scripts/package.mjs
          --${{ matrix.target }} ${{ matrix.archs }} --publish always
          --config.publish.owner=${{ github.repository_owner }}
          --config.publish.repo=multica
