name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build, type check, and test
        run: pnpm build && pnpm typecheck && pnpm test

  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: multica
          POSTGRES_USER: multica
          POSTGRES_PASSWORD: multica
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U multica -d multica"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgres://multica:multica@localhost:5432/multica?sslmode=disable
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum

      - name: Build
        run: cd server && go build ./...

      - name: Run migrations
        run: cd server && go run ./cmd/migrate up

      - name: Test
        run: cd server && go test ./...

  # Cross-compile verification: ensure the CLI builds for all target platforms.
  cross-compile:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: server/go.sum

      - name: Cross-compile CLI (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd server && CGO_ENABLED=0 go build -ldflags "-s -w" -o /dev/null ./cmd/multica

      - name: Cross-compile server (${{ matrix.goos }}/${{ matrix.goarch }})
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          cd server && CGO_ENABLED=0 go build -ldflags "-s -w" -o /dev/null ./cmd/server

  # Container build verification: ensure the Dockerfile builds successfully.
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: multica:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Containerized integration test: spin up the full stack via Docker Compose
  # and verify the server starts and responds to health checks.
  container-integration:
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: multica:test
          cache-from: type=gha

      - name: Start services
        run: |
          cat > docker-compose.ci.yml <<'COMPOSE'
          name: multica-ci
          services:
            postgres:
              image: pgvector/pgvector:pg17
              environment:
                POSTGRES_DB: multica
                POSTGRES_USER: multica
                POSTGRES_PASSWORD: multica
              healthcheck:
                test: ["CMD-SHELL", "pg_isready -U multica -d multica"]
                interval: 3s
                timeout: 3s
                retries: 30

            migrate:
              image: multica:test
              entrypoint: ["./migrate", "up"]
              environment:
                DATABASE_URL: postgres://multica:multica@postgres:5432/multica?sslmode=disable
              depends_on:
                postgres:
                  condition: service_healthy

            server:
              image: multica:test
              environment:
                DATABASE_URL: postgres://multica:multica@postgres:5432/multica?sslmode=disable
                PORT: "8080"
              ports:
                - "8080:8080"
              depends_on:
                migrate:
                  condition: service_completed_successfully
          COMPOSE
          docker compose -f docker-compose.ci.yml up -d

      - name: Verify health endpoint
        run: |
          echo "Checking server health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/health; then
              echo ""
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 2
          done
          echo "Health check failed after 30 attempts"
          docker compose -f docker-compose.ci.yml logs server
          exit 1

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.ci.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
