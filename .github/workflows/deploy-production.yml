name: Deploy Production

# Self-hosted CD for Multica's Mac mini production host.
#
# Triggers:
#   - push to main: continuous deploy on every merge.
#   - workflow_dispatch: manual / Ship-Hub-driven re-deploy. Useful for
#     re-running after a transient docker build failure, or for shipping
#     a release in flight when "Mark production deployed" was skipped.
#
# Trust model:
#   - Runs ONLY on push to main + manual dispatch. No pull_request
#     trigger — that would let any fork PR execute arbitrary code on the
#     Mac mini. Branch protection on main is the user's safety floor:
#     only merged PRs land here.
#   - Runs on a self-hosted runner labeled `mac-mini-prod`. The runner
#     binary itself is the one piece of trust on the host; everything
#     else flows from "what's currently on main".
#
# Wired into Ship Hub:
#   - Workspace setting `ship_hub_deploy_workflow_production` is set to
#     `deploy-production.yml` so the deploy-workflow poller watches this
#     workflow's runs. On `conclusion=success` with a matching SHA, the
#     poller flips the release stage from `promoting` to `in_production`
#     within 2 minutes. The deployment-status step below is an optional
#     accelerator (~immediate) for the same transition.

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      sha:
        description: "Specific commit SHA to deploy (defaults to main HEAD)"
        required: false
        type: string

# Only one production deploy at a time. New pushes queue, then run with
# `cancel-in-progress: false` so we don't mid-build kill a deploy that's
# already touching the container state. Better to deploy stale-then-
# fresh than to leave the host in a partially-deployed state.
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + restart containers
    runs-on: [self-hosted, macOS, mac-mini-prod]
    timeout-minutes: 30
    permissions:
      contents: read
      deployments: write
    env:
      # Docker Desktop's credential helper lives in this path; the
      # default shell PATH on a non-login ssh / runner shell omits it
      # and `docker compose build` then fails with
      # "docker-credential-desktop: executable not found".
      DOCKER_PATH_EXTRAS: /usr/local/bin:/Applications/Docker.app/Contents/Resources/bin
      COMPOSE_PROJECT: multica
      COMPOSE_FILES: -f docker-compose.selfhost.yml -f docker-compose.selfhost.build.yml
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # `workflow_dispatch` lets the caller pin a specific SHA;
          # otherwise we take whatever main is at right now.
          ref: ${{ github.event.inputs.sha || github.ref }}
          # Full history isn't needed for the build; shallow checkout
          # speeds up the runner. If a future step needs `git log`,
          # bump this.
          fetch-depth: 1

      - name: Materialize operator .env from stable host path
        # actions/checkout wipes untracked files in the workdir on
        # every run, including any .env the operator dropped there
        # manually. Operators store their per-host config (port
        # overrides, secrets, etc.) at ~/multica-deploy.env (a path
        # outside the runner workdir, so it survives checkout); we
        # copy it in here so docker compose AND the preflight step
        # both see the same values.
        run: |
          if [ -f "${HOME}/multica-deploy.env" ]; then
            cp "${HOME}/multica-deploy.env" .env
            echo "Loaded operator config from ~/multica-deploy.env"
          else
            echo "No ~/multica-deploy.env on this host; using compose defaults."
          fi

      # Record the deployment in GitHub so the timeline + Ship Hub get
      # an immediate signal instead of waiting for the 2-min poller.
      - name: Create deployment
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              description: 'Mac mini self-hosted deploy',
              auto_merge: false,
              required_contexts: [],
              production_environment: true,
            });
            // Some API shapes return an error object on conflict; guard.
            if (!data?.id) {
              core.setFailed(`createDeployment did not return an id: ${JSON.stringify(data)}`);
              return;
            }
            core.setOutput('deployment_id', data.id);

      - name: Mark deployment in_progress
        if: steps.deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'in_progress',
              description: 'Building images and recreating containers',
              environment: 'production',
              auto_inactive: false,
            });

      - name: Stop orphaned containers from prior builds
        # `docker compose up` only manages containers under its OWN
        # project name (here: `multica`, set via `name:` in
        # docker-compose.selfhost.yml). Containers left over from a
        # prior local build that didn't use the same project name
        # still hold the host ports we're about to bind, and the up
        # command fails with "Bind for 0.0.0.0:PORT failed: port is
        # already allocated".
        #
        # Sweep any leftover containers whose name starts with
        # `multica-` (from a no-project-name compose) OR matches
        # known service names. Idempotent — silently no-ops on a
        # clean host. Force-rm because we'll recreate them in the
        # next step.
        #
        # Runs BEFORE the preflight port check so our own stale
        # containers (multica-backend-1 from a half-failed prior
        # deploy still holding :8080) don't trip the preflight.
        run: |
          export PATH="${DOCKER_PATH_EXTRAS}:${PATH}"
          set -e
          # Tear down anything still labeled with this project first.
          docker compose ${COMPOSE_FILES} down --remove-orphans || true
          # Then catch loose containers from outside the project name
          # (old `docker compose up` runs that didn't use `name:`).
          for n in $(docker ps -aq --filter "name=multica-"); do
            echo "Removing orphan container $n"
            docker rm -f "$n" || true
          done

      - name: Pre-flight — required host ports are free
        # If something OUTSIDE our own docker project holds the port
        # we're about to bind — another tenant container on this Mac
        # mini (pisignage-server, winery-manager, etc.), a homebrew
        # node, an old `pnpm dev:web`, a PM2-managed service, a
        # launchd job — docker fails with the unhelpful
        # `Bind for 0.0.0.0:PORT failed` *only after* a full image
        # rebuild that can take 5+ minutes. Detect early and fail
        # loud with the offending pid so the operator knows what to
        # kill on the host or which `*_PORT` env var to retarget.
        #
        # We check the host ports that compose will try to bind:
        #   - backend:  ${PORT:-8080}
        #   - frontend: ${FRONTEND_PORT:-3000}
        # (postgres no longer publishes a host port — see PR #26.)
        #
        # Source the operator's .env first so the values here line up
        # with what docker compose will actually use — otherwise the
        # preflight checks the defaults (3000/8080) even when .env
        # retargets the frontend onto a different host port.
        run: |
          if [ -f .env ]; then
            set -o allexport
            # shellcheck disable=SC1091
            . ./.env
            set +o allexport
          fi
          BACKEND_PORT="${PORT:-8080}"
          FRONTEND_HOST_PORT="${FRONTEND_PORT:-3000}"
          fail=0
          for port in "$BACKEND_PORT" "$FRONTEND_HOST_PORT"; do
            holder=$(lsof -nP -iTCP:"$port" -sTCP:LISTEN 2>/dev/null | tail -n +2 || true)
            if [ -n "$holder" ]; then
              echo "::error::Port $port is already bound on the host:"
              echo "$holder"
              fail=1
            else
              echo "Port $port is free."
            fi
          done
          if [ $fail -eq 1 ]; then
            echo ""
            echo "Free the port(s) above (kill the process or stop the service)"
            echo "and re-run the workflow. The orphan-container sweep above"
            echo "only handles multica's own docker-managed containers — anything"
            echo "outside our project shows up here and needs operator action."
            exit 1
          fi

      - name: Build + restart containers
        # `up -d --build` is idempotent: rebuilds images that changed,
        # recreates only containers whose image hash moved, leaves
        # postgres alone. Single command rather than separate build +
        # restart because compose handles the "did anything change"
        # question better than we would scripting it.
        run: |
          export PATH="${DOCKER_PATH_EXTRAS}:${PATH}"
          docker compose ${COMPOSE_FILES} up -d --build frontend backend

      - name: Health check
        # Hit the frontend INSIDE the docker network rather than via
        # the host port mapping. The host port is whatever the operator
        # set in `.env` (FRONTEND_PORT) plus whatever else lives on
        # the box; we shouldn't couple the deploy gate to that. The
        # in-network port is always 3000 (HOSTNAME=0.0.0.0 PORT=3000
        # set by the frontend Dockerfile).
        #
        # We poll for up to ~60s because Next.js can take 5-15s to
        # actually accept traffic after the container reports started.
        run: |
          export PATH="${DOCKER_PATH_EXTRAS}:${PATH}"
          for i in $(seq 1 30); do
            code=$(docker compose ${COMPOSE_FILES} exec -T frontend \
                     sh -c 'wget -qO- -S http://localhost:3000/ 2>&1 | grep -m1 "HTTP/" | awk "{print \$2}"' \
                   2>/dev/null | tr -d "\r" || echo 000)
            if [ "$code" = "200" ]; then
              echo "Frontend healthy after ${i} attempts (code=${code})"
              exit 0
            fi
            echo "Attempt ${i}: code=${code}, retrying in 2s..."
            sleep 2
          done
          echo "Frontend never returned 200 within 60s; failing deploy."
          # Dump recent backend + frontend logs so the failed run gives
          # us something to grep when triaging.
          docker compose ${COMPOSE_FILES} logs --tail 50 backend frontend || true
          exit 1

      - name: Mark deployment success
        if: success() && steps.deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'success',
              description: 'Containers healthy on multica.wisco.wine',
              environment: 'production',
              environment_url: 'https://multica.wisco.wine',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              auto_inactive: true,
            });

      - name: Mark deployment failure
        if: failure() && steps.deployment.outputs.deployment_id
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: ${{ steps.deployment.outputs.deployment_id }},
              state: 'failure',
              description: 'Deploy failed — check workflow logs',
              environment: 'production',
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            });
