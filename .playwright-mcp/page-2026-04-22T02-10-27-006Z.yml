          - paragraph [ref=e754]: 与社区一起建设，而不仅仅是为社区建设。贡献技能、集成和 Agent 后端，让每个人受益。
    - generic [ref=e756]:
      - generic [ref=e757]:
        - paragraph [ref=e758]: 常见问题
        - heading "问与答。" [level=2] [ref=e759]
      - generic [ref=e760]:
        - generic [ref=e761]:
          - button "Multica 支持哪些编码 Agent？" [ref=e762]:
            - generic [ref=e763]: Multica 支持哪些编码 Agent？
            - img [ref=e765]
          - paragraph [ref=e767]: Multica 目前开箱即用支持 Claude Code、Codex、OpenClaw 和 OpenCode。守护进程自动检测你安装的 CLI。因为开源，你也可以自己添加后端。
        - generic [ref=e768]:
          - button "需要自托管吗，还是有云版本？" [ref=e769]:
            - generic [ref=e770]: 需要自托管吗，还是有云版本？
            - img [ref=e772]
          - paragraph [ref=e774]: 两者都有。你可以用 Docker Compose 或 Kubernetes 在自己的基础设施上自托管 Multica，也可以使用我们的托管云版本。你的数据，你选择。
        - generic [ref=e775]:
          - button "这和直接用编码 Agent 有什么区别？" [ref=e776]:
            - generic [ref=e777]: 这和直接用编码 Agent 有什么区别？
            - img [ref=e779]
          - paragraph [ref=e781]: 编码 Agent 擅长执行。Multica 添加的是管理层：任务队列、团队协作、技能复用、运行时监控，以及每个 Agent 在做什么的统一视图。把它想象成你的 Agent 的项目经理。
        - generic [ref=e782]:
          - button "Agent 能自主处理长时间任务吗？" [ref=e783]:
            - generic [ref=e784]: Agent 能自主处理长时间任务吗？
            - img [ref=e786]
          - paragraph [ref=e788]: 可以。Multica 管理完整的任务生命周期——入队、领取、执行、完成或失败。Agent 主动报告阻塞并实时推送进度。你可以随时查看，也可以让它们运行整晚。
        - generic [ref=e789]:
          - button "我的代码安全吗？Agent 在哪里执行？" [ref=e790]:
            - generic [ref=e791]: 我的代码安全吗？Agent 在哪里执行？
            - img [ref=e793]
          - paragraph [ref=e795]: Agent 在你的机器（本地守护进程）或你自己的云基础设施上执行。代码永远不会经过 Multica 服务器。平台只协调任务状态和广播事件。
        - generic [ref=e796]:
          - button "我可以运行多少个 Agent？" [ref=e797]:
            - generic [ref=e798]: 我可以运行多少个 Agent？
            - img [ref=e800]
          - paragraph [ref=e802]: 取决于你的硬件。每个 Agent 有可配置的并发限制，你可以连接多台机器作为运行时。开源版本没有任何人为限制。
