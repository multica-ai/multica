# Default values for multica.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []
serviceAccount:
  create: true
  annotations: {}
  name: ""

backend:
  replicaCount: 1

  image:
    repository: ghcr.io/multica-ai/multica-backend
    pullPolicy: IfNotPresent
    tag: "0.0.1"

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}

  service:
    type: ClusterIP
    port: 8080

  config:
    port: "8080"
    appEnv: "production"
    corsAllowedOrigins: ""
    frontendOrigin: ""
    allowSignup: "true"
    allowedEmails: []
    allowedEmailDomains: []
    publicURL: ""
    trustedProxies: []
    rateLimitTrustedProxies: []
    realtimeMetricsToken: ""
    multicaCloudFleetUrl: ""
    multicaFleetUrl: ""
    redisUrl: ""
    realtimeRelayMode: ""
    realtimeRelayShards: ""
    realtimeRelayStreamMaxLen: ""
    realtimeRelayXreadCount: ""
    realtimeRelayXreadBlock: ""
    metricsAddr: ""
    posthogApiKey: ""
    posthogHost: ""
    analyticsDisabled: "false"
    analyticsEnvironment: ""
    localUploadDir: ""
    localUploadBaseUrl: ""
    s3Bucket: ""
    s3Region: ""
    awsEndpointUrl: ""
    cloudfrontDomain: ""
    multicaDevVerificationCode: ""

  secrets:
    databaseUrl: ""
    jwtSecret: ""
    resendApiKey: ""
    smtpHost: ""
    smtpPort: ""
    smtpUser: ""
    smtpPassword: ""
    smtpFrom: ""
    awsAccessKeyId: ""
    awsSecretAccessKey: ""
    openaiApiKey: ""
    anthropicApiKey: ""

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  volumes: []
  volumeMounts: []
  extraEnv: []

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: ""

web:
  replicaCount: 1

  image:
    repository: ghcr.io/multica-ai/multica-web
    pullPolicy: IfNotPresent
    tag: "0.0.1"

  podAnnotations: {}
  podSecurityContext: {}
  securityContext: {}

  service:
    type: ClusterIP
    port: 3000

  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  volumes: []
  volumeMounts: []
  # Subpath deployment: set NEXT_PUBLIC_API_URL so API requests go to
  # /multica-backend/* and NEXT_PUBLIC_BASE_PATH for the web subpath.
  # The proxy layer (e.g. Nginx) routes /multica-backend/* directly to
  # the backend service; Next.js rewrite is not needed.
  # extraEnv:
  #   - name: NEXT_PUBLIC_BASE_PATH
  #     value: "/multica-web"
  #   - name: NEXT_PUBLIC_API_URL
  #     value: "/multica-backend"
  extraEnv: []

  livenessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
    targetMemoryUtilizationPercentage: ""

ingress:
  enabled: false
  className: ""
  annotations: {}
  # Example: subpath deployment with separate routes for web and backend
  # hosts:
  #   - host: zgsmtest.cn
  #     paths:
  #       - path: /multica-web
  #         pathType: Prefix
  #         service: web
  #       - path: /auth
  #         pathType: Prefix
  #         service: backend
  #       - path: /api
  #         pathType: Prefix
  #         service: backend
  #       - path: /ws
  #         pathType: Prefix
  #         service: backend
  #       - path: /uploads
  #         pathType: Prefix
  #         service: backend
  hosts: []
  tls: []
