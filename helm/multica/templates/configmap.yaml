apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "multica.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.backend.config.port | quote }}
  APP_ENV: {{ .Values.backend.config.appEnv | quote }}
  {{- if .Values.backend.config.corsAllowedOrigins }}
  CORS_ALLOWED_ORIGINS: {{ .Values.backend.config.corsAllowedOrigins | quote }}
  {{- end }}
  {{- if .Values.backend.config.frontendOrigin }}
  FRONTEND_ORIGIN: {{ .Values.backend.config.frontendOrigin | quote }}
  {{- end }}
  ALLOW_SIGNUP: {{ .Values.backend.config.allowSignup | quote }}
  {{- if .Values.backend.config.allowedEmails }}
  ALLOWED_EMAILS: {{ join "," .Values.backend.config.allowedEmails | quote }}
  {{- end }}
  {{- if .Values.backend.config.allowedEmailDomains }}
  ALLOWED_EMAIL_DOMAINS: {{ join "," .Values.backend.config.allowedEmailDomains | quote }}
  {{- end }}
  {{- if .Values.backend.config.publicURL }}
  MULTICA_PUBLIC_URL: {{ .Values.backend.config.publicURL | quote }}
  {{- end }}
  {{- if .Values.backend.config.trustedProxies }}
  MULTICA_TRUSTED_PROXIES: {{ join "," .Values.backend.config.trustedProxies | quote }}
  {{- end }}
  {{- if .Values.backend.config.rateLimitTrustedProxies }}
  RATE_LIMIT_TRUSTED_PROXIES: {{ join "," .Values.backend.config.rateLimitTrustedProxies | quote }}
  {{- end }}
  {{- if .Values.backend.config.realtimeMetricsToken }}
  REALTIME_METRICS_TOKEN: {{ .Values.backend.config.realtimeMetricsToken | quote }}
  {{- end }}
  {{- if .Values.backend.config.multicaCloudFleetUrl }}
  MULTICA_CLOUD_FLEET_URL: {{ .Values.backend.config.multicaCloudFleetUrl | quote }}
  {{- end }}
  {{- if .Values.backend.config.multicaFleetUrl }}
  MULTICA_FLEET_URL: {{ .Values.backend.config.multicaFleetUrl | quote }}
  {{- end }}
  {{- if .Values.backend.config.redisUrl }}
  REDIS_URL: {{ .Values.backend.config.redisUrl | quote }}
  {{- end }}
  {{- if .Values.backend.config.realtimeRelayMode }}
  REALTIME_RELAY_MODE: {{ .Values.backend.config.realtimeRelayMode | quote }}
  {{- end }}
  {{- if .Values.backend.config.realtimeRelayShards }}
  REALTIME_RELAY_SHARDS: {{ .Values.backend.config.realtimeRelayShards | quote }}
  {{- end }}
  {{- if .Values.backend.config.realtimeRelayStreamMaxLen }}
  REALTIME_RELAY_STREAM_MAXLEN: {{ .Values.backend.config.realtimeRelayStreamMaxLen | quote }}
  {{- end }}
  {{- if .Values.backend.config.realtimeRelayXreadCount }}
  REALTIME_RELAY_XREAD_COUNT: {{ .Values.backend.config.realtimeRelayXreadCount | quote }}
  {{- end }}
  {{- if .Values.backend.config.realtimeRelayXreadBlock }}
  REALTIME_RELAY_XREAD_BLOCK: {{ .Values.backend.config.realtimeRelayXreadBlock | quote }}
  {{- end }}
  {{- if .Values.backend.config.metricsAddr }}
  METRICS_ADDR: {{ .Values.backend.config.metricsAddr | quote }}
  {{- end }}
  {{- if .Values.backend.config.posthogApiKey }}
  POSTHOG_API_KEY: {{ .Values.backend.config.posthogApiKey | quote }}
  {{- end }}
  {{- if .Values.backend.config.posthogHost }}
  POSTHOG_HOST: {{ .Values.backend.config.posthogHost | quote }}
  {{- end }}
  ANALYTICS_DISABLED: {{ .Values.backend.config.analyticsDisabled | quote }}
  {{- if .Values.backend.config.analyticsEnvironment }}
  ANALYTICS_ENVIRONMENT: {{ .Values.backend.config.analyticsEnvironment | quote }}
  {{- end }}
  {{- if .Values.backend.config.localUploadDir }}
  LOCAL_UPLOAD_DIR: {{ .Values.backend.config.localUploadDir | quote }}
  {{- end }}
  {{- if .Values.backend.config.localUploadBaseUrl }}
  LOCAL_UPLOAD_BASE_URL: {{ .Values.backend.config.localUploadBaseUrl | quote }}
  {{- end }}
  {{- if .Values.backend.config.s3Bucket }}
  S3_BUCKET: {{ .Values.backend.config.s3Bucket | quote }}
  {{- end }}
  {{- if .Values.backend.config.s3Region }}
  S3_REGION: {{ .Values.backend.config.s3Region | quote }}
  {{- end }}
  {{- if .Values.backend.config.awsEndpointUrl }}
  AWS_ENDPOINT_URL: {{ .Values.backend.config.awsEndpointUrl | quote }}
  {{- end }}
  {{- if .Values.backend.config.cloudfrontDomain }}
  CLOUDFRONT_DOMAIN: {{ .Values.backend.config.cloudfrontDomain | quote }}
  {{- end }}
  {{- if .Values.backend.config.multicaDevVerificationCode }}
  MULTICA_DEV_VERIFICATION_CODE: {{ .Values.backend.config.multicaDevVerificationCode | quote }}
  {{- end }}
