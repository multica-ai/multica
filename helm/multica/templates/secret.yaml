apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multica.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ required "A valid .Values.backend.secrets.databaseUrl entry required!" .Values.backend.secrets.databaseUrl | quote }}
  JWT_SECRET: {{ required "A valid .Values.backend.secrets.jwtSecret entry required!" .Values.backend.secrets.jwtSecret | quote }}
  {{- if .Values.backend.secrets.resendApiKey }}
  RESEND_API_KEY: {{ .Values.backend.secrets.resendApiKey | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.smtpHost }}
  SMTP_HOST: {{ .Values.backend.secrets.smtpHost | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.smtpPort }}
  SMTP_PORT: {{ .Values.backend.secrets.smtpPort | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.smtpUser }}
  SMTP_USER: {{ .Values.backend.secrets.smtpUser | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.smtpPassword }}
  SMTP_PASSWORD: {{ .Values.backend.secrets.smtpPassword | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.smtpFrom }}
  SMTP_FROM: {{ .Values.backend.secrets.smtpFrom | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.awsAccessKeyId }}
  AWS_ACCESS_KEY_ID: {{ .Values.backend.secrets.awsAccessKeyId | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.awsSecretAccessKey }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.backend.secrets.awsSecretAccessKey | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.backend.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.backend.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.backend.secrets.anthropicApiKey | quote }}
  {{- end }}
