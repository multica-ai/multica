apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.fullname" . }}-backend
  namespace: {{ include "multica.namespace" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "multica.backendSelectorLabels" . | nindent 4 }}
