# Self-hosting Docker Compose — starts PostgreSQL, backend, and frontend.
#
# Usage:
#   cp .env.example .env
#   # Edit .env — change JWT_SECRET at minimum
#   docker compose -f docker-compose.selfhost.yml up -d
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8080 (also used by CLI/daemon)

name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: true
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/data/uploads
    environment:
      # Container-topology overrides. Secrets/app URLs come from .env via
      # env_file above; explicit entries here take precedence over .env.
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: "8080"
      APP_ENV: ${APP_ENV:-production}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        REMOTE_API_URL: http://backend:8080
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        NEXT_PUBLIC_APP_VERSION: ${MULTICA_IMAGE_TAG:-dev}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped

volumes:
  pgdata:
  backend_uploads:
