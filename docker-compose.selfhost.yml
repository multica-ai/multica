# Self-hosting Docker Compose — starts PostgreSQL, backend, and frontend.
#
# Usage:
#   cp .env.example .env
#   # Edit .env — change JWT_SECRET at minimum
#   docker compose -f docker-compose.selfhost.yml up -d
#
# Frontend: http://localhost:3000
# Backend:  http://localhost:8080 (also used by CLI/daemon)

# Compose project name. Distinct from `multica` (the project name the
# dev / worktree compose file uses — see CLAUDE.md "All checkouts share
# one PostgreSQL container") so that running `make dev` or any
# `docker compose up postgres` from an arbitrary multica checkout on
# the same docker engine cannot stomp the prod stack's containers.
#
# Why this matters: on a self-hosted runner that ALSO hosts agent task
# workspaces, every agent workspace is a checkout of this repo with
# `docker-compose.yml` (the dev compose file). Without a distinct name
# here, both stacks would compete for the project namespace `multica`,
# and the next agent `make dev` would tear down + recreate the prod
# postgres container under the dev spec — outage, port collisions, the
# works.
#
# Override via `MULTICA_SELFHOST_PROJECT` in operator .env if you need
# the legacy name (e.g. existing installations that haven't migrated).
#
# Pre-existing data volumes are preserved via the explicit `name:`
# attribute on the volumes block below — they keep their literal
# `multica_pgdata` / `multica_backend_uploads` names regardless of the
# project rename, so this migration is non-destructive for upgrades.
name: ${MULTICA_SELFHOST_PROJECT:-multica-prod}

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    # Postgres is only reached from the backend container over the
    # docker network (DATABASE_URL=postgres://...@postgres:5432/...);
    # publishing to the host port is needless and collides with any
    # existing local postgres (homebrew, a leftover dev container
    # from `make db-up`, etc.). Self-hosters who want host access
    # (for backups/psql) can add their own override file with the
    # 127.0.0.1-bound ports block from upstream.
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${MULTICA_BACKEND_IMAGE:-ghcr.io/multica-ai/multica-backend}:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT:-8080}:8080"
    volumes:
      - backend_uploads:/app/data/uploads
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: "8080"
      METRICS_ADDR: ${METRICS_ADDR:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3000/auth/callback}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      APP_ENV: ${APP_ENV:-production}
      MULTICA_DEV_VERIFICATION_CODE: ${MULTICA_DEV_VERIFICATION_CODE:-}
      MULTICA_APP_URL: ${MULTICA_APP_URL:-http://localhost:3000}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}
    restart: unless-stopped

  frontend:
    image: ${MULTICA_WEB_IMAGE:-ghcr.io/multica-ai/multica-web}:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped

volumes:
  # Volumes are pinned to their literal names via `name:` so existing
  # installations that have data under `multica_pgdata` /
  # `multica_backend_uploads` (created when this stack used
  # `name: multica`) keep their data after the project rename to
  # `multica-prod`. Without `name:` here, compose would prefix the
  # volume with the new project name (`multica-prod_pgdata`) and the
  # old volume would be orphaned — silent data loss on upgrade.
  pgdata:
    name: multica_pgdata
  backend_uploads:
    name: multica_backend_uploads
