name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: multica
      POSTGRES_USER: multica
      POSTGRES_PASSWORD: multica
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multica -d multica"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/multica-ai/multica-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - target: 8080
        published: 8080
        protocol: tcp
        mode: host
    volumes:
      - backend_uploads:/app/data/uploads
    environment:
      DATABASE_URL: postgres://multica:multica@postgres:5432/multica?sslmode=disable
      PORT: "8080"
      JWT_SECRET: change-me-in-production
      FRONTEND_ORIGIN: http://localhost:8081
      MULTICA_APP_URL: http://localhost:8081
      ALLOW_SIGNUP: true
      MULTICA_DEV_VERIFICATION_CODE: 123456
    restart: unless-stopped

  frontend:
    image: ghcr.io/multica-ai/multica-web:latest
    depends_on:
      - backend
    ports:
      - target: 3000
        published: 8081
        protocol: tcp
        mode: host
    environment:
      HOSTNAME: "0.0.0.0"
    restart: unless-stopped

volumes:
  pgdata:
  backend_uploads: