# Podman-native local dev stack.
#
# Differences from docker-compose.selfhost.yml:
#  - Uses locally-built images (multica-backend:latest, multica-frontend:latest)
#    produced by `make podman-build`.
#  - postgres maps to host port 5433 to avoid colliding with any existing
#    postgres container on 5432.
#  - DATABASE_URL uses the compose service name "postgres" (internal DNS).
#  - Frontend uses REMOTE_API_URL=http://host.containers.internal:<PORT> so
#    Next.js SSR can reach the backend through the podman host bridge.
#
# Usage:
#   make podman-build    # build images from current checkout
#   make podman-up       # start postgres + backend + frontend
#   make podman-down     # stop all
#   make podman-logs     # tail logs
#   make podman-migrate  # run DB migrations inside the running backend

name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: multica-backend:latest
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-18600}:8080"
    volumes:
      - backend_uploads:/app/data/uploads
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      PORT: "8080"
      JWT_SECRET: ${JWT_SECRET:-change-me-in-dev}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:18601}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:18601/auth/callback}
      APP_ENV: ${APP_ENV:-production}
      MULTICA_DEV_VERIFICATION_CODE: ${MULTICA_DEV_VERIFICATION_CODE:-}
      MULTICA_APP_URL: ${MULTICA_APP_URL:-http://localhost:18601}
      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}
      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      METRICS_ADDR: ${METRICS_ADDR:-}
    restart: unless-stopped

  frontend:
    image: multica-frontend:latest
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-18601}:3000"
    environment:
      HOSTNAME: "0.0.0.0"
      # Next.js SSR fetches go through the podman host bridge, not the compose
      # internal network, because the frontend image is pre-built with a
      # baked-in REMOTE_API_URL. Override here if the port differs.
      REMOTE_API_URL: http://host.containers.internal:${PORT:-18600}
    restart: unless-stopped

volumes:
  pgdata:
  backend_uploads:
