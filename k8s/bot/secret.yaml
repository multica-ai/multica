apiVersion: v1
kind: Secret
metadata:
  name: multica-bot-secrets
  namespace: multica-bot
type: Opaque
# Render this template with environment variables before applying:
#   set -a && source .env.bot && set +a
#   envsubst < k8s/bot/secret.yaml | kubectl apply -f -
stringData:
  JWT_SECRET: "${JWT_SECRET}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
  RESEND_API_KEY: "${RESEND_API_KEY}"
  RESEND_FROM_EMAIL: "${RESEND_FROM_EMAIL}"
  SMTP_HOST: "${SMTP_HOST}"
  SMTP_PORT: "${SMTP_PORT}"
  SMTP_USERNAME: "${SMTP_USERNAME}"
  SMTP_PASSWORD: "${SMTP_PASSWORD}"
  SMTP_SSL: "${SMTP_SSL}"
  SMTP_FROM_NAME: "${SMTP_FROM_NAME}"
  GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
  GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
  GOOGLE_TOKEN_URL: "${GOOGLE_TOKEN_URL}"
  GOOGLE_USERINFO_URL: "${GOOGLE_USERINFO_URL}"
  GOOGLE_OAUTH_PROXY: "${GOOGLE_OAUTH_PROXY}"
  DINGTALK_CLIENT_ID: "${DINGTALK_CLIENT_ID}"
  DINGTALK_CLIENT_SECRET: "${DINGTALK_CLIENT_SECRET}"
  DINGTALK_ROBOT_CODE: "${DINGTALK_ROBOT_CODE}"
  DINGTALK_TOKEN_ENCRYPTION_KEY: "${DINGTALK_TOKEN_ENCRYPTION_KEY}"
  DATABASE_URL: "${DATABASE_URL}"
  GITEE_TOKEN: "${GITEE_TOKEN}"
  S3_BUCKET: "${S3_BUCKET}"
  S3_REGION: "${S3_REGION}"
  S3_KEY_PREFIX: "${S3_KEY_PREFIX}"
  S3_FORCE_PATH_STYLE: "${S3_FORCE_PATH_STYLE}"
  AWS_ENDPOINT_URL: "${AWS_ENDPOINT_URL}"
  AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID}"
  AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY}"
  CLOUDFRONT_KEY_PAIR_ID: "${CLOUDFRONT_KEY_PAIR_ID}"
  CLOUDFRONT_PRIVATE_KEY_SECRET: "${CLOUDFRONT_PRIVATE_KEY_SECRET}"
  CLOUDFRONT_PRIVATE_KEY: "${CLOUDFRONT_PRIVATE_KEY}"
  CLOUDFRONT_DOMAIN: "${CLOUDFRONT_DOMAIN}"
