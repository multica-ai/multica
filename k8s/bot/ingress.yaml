apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-bot
  namespace: multica-bot
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - multica.wujieai.com
      secretName: all-wujieai-cert
  rules:
    - host: multica.wujieai.com
      http:
        paths:
          # API & WebSocket routes → backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # Auth API routes → backend. Keep these exact so frontend-owned
          # routes such as /auth/callback are not shadowed by the backend.
          - path: /auth/send-code
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /auth/verify-code
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /auth/google
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /auth/dingtalk
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /auth/logout
            pathType: Exact
            backend:
              service:
                name: backend
                port:
                  number: 8080
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # Everything else → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
