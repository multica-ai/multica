apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: multica-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: swr-secret
      containers:
        - name: backend
          image: swr.ap-southeast-1.myhuaweicloud.com/mazeai/multica-backend:bot
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: multica-bot-secrets
          env:
            - name: APP_ENV
              value: production
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 2G
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: backend-uploads
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backend-uploads
  namespace: multica-bot
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: multica-bot
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
