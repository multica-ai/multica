services:
  pr-agent-sidecar:
    build: .
    container_name: pr-agent-sidecar
    restart: unless-stopped
    env_file: .env
    volumes:
      - /Users/rtk-agent/Downloads/multica-pr-agent-dev-zap.2026-05-22.private-key.pem:/run/secrets/github-app.pem
    networks: [multica-bridge]

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: pr-agent-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - pr-agent-sidecar
    networks: [multica-bridge]

networks:
  multica-bridge:
    external: true
