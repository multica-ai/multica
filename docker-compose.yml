name: wallts

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: wallts
      POSTGRES_USER: ${POSTGRES_USER:-wallts}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wallts}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
