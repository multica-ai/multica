# ACK ALB Ingress. The actual ALB instance + listeners live in albconfig.yaml;
# this resource only defines the host + path rules. Both are reconciled by the
# ALB Ingress Controller.
#
# Routing strategy — path-based on a single host, single listener per protocol
# (see albconfig.yaml):
#   /api/*, /auth/*, /ws, /uploads/*   → multica-server:8080
#   /                                  → multica-web:3000  (catch-all)
#
# Hosts:
#   - multica.lilithgames.com  → canonical, serves the app
#   - ship.lilithgames.com     → 301 → https://multica.lilithgames.com${path}?${query}
#                                via the ALB Redirect action annotation below.
#                                The "ship-to-multica-redirect" service name is
#                                a placeholder — the controller intercepts it
#                                because port.name == "use-annotation" and uses
#                                the matching actions.<name> annotation instead
#                                of routing to a real backend.
# TLS uses the wildcard *.lilithgames.com cert in multica-tls (covers both).
#
# WebSocket note: ACK ALB supports WS natively; no extra annotation needed.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica
  annotations:
    # HTTP 80 → HTTPS 443 with 301. Applies to every rule on the HTTP listener
    # so a user hitting http://multica.lilithgames.com lands on https:// cleanly
    # instead of the controller's default fake-svc (which 503s).
    alb.ingress.kubernetes.io/force-override-https: "true"
    # IP whitelist. The ACL was pre-created via Aliyun CLI + Python SDK
    # (85 CIDRs covering Lilith office / VPN / cloud egress). Controller
    # associates it with both listeners on apply.
    alb.ingress.kubernetes.io/acl-id: "acl-ry04o6lyky6tmscnfu"
    alb.ingress.kubernetes.io/acl-type: "White"
    # Redirect every ship.lilithgames.com request → multica.lilithgames.com
    # with the same path + query, as a 301. ${path} / ${query} / ${host} are
    # ALB placeholders the controller substitutes at request time. ACL above
    # still gates the redirect itself, matching ship's pre-cutover access
    # control so scanners can't enumerate via the redirect either.
    alb.ingress.kubernetes.io/actions.ship-to-multica-redirect: |
      [{"type":"Redirect","RedirectConfig":{"host":"multica.lilithgames.com","path":"${path}","port":"443","protocol":"https","query":"${query}","httpCode":"301"}}]
spec:
  ingressClassName: multica-alb
  tls:
    - hosts:
        - multica.lilithgames.com
        - ship.lilithgames.com
      secretName: multica-tls
  rules:
    - host: multica.lilithgames.com
      http:
        paths:
          # OAuth callback pages are Next.js routes in apps/web — match them
          # first so they reach the web Deployment, not the backend (which
          # only exposes POST /auth/<provider> for the code exchange).
          - path: /auth/callback
            pathType: Exact
            backend:
              service:
                name: multica-web
                port:
                  number: 3000
          - path: /auth/feishu/callback
            pathType: Exact
            backend:
              service:
                name: multica-web
                port:
                  number: 3000
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: multica-server
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: multica-server
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: multica-server
                port:
                  number: 8080
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: multica-server
                port:
                  number: 8080
          # Meego (Feishu Project) webhook ingest. Routed to the bridge
          # which captures the payload and (later) syncs to multica issues.
          - path: /webhook/meego
            pathType: Prefix
            backend:
              service:
                name: multica-feishu-bridge
                port:
                  number: 8080
          # Bridge also serves /doc/install.md (the agent-facing install
          # guide bake'd into the bridge image). The bridge serves it on
          # localhost:8080 already; this route just exposes it through ALB
          # so AI agents can `read https://multica.lilithgames.com/doc/install.md`.
          - path: /doc
            pathType: Prefix
            backend:
              service:
                name: multica-feishu-bridge
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-web
                port:
                  number: 3000
    # ship.lilithgames.com — every path 301-redirected to the multica equivalent
    # via the ALB Redirect action annotation declared above. Old bookmarks /
    # in-flight OAuth callbacks / archived emails keep working.
    - host: ship.lilithgames.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ship-to-multica-redirect
                port:
                  name: use-annotation
