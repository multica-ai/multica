# Template Secret. Replace every "REPLACE_ME" before applying, or generate the
# Secret out-of-band (sealed-secrets, external-secrets, vault, etc.) and remove
# this file from the kustomization.
#
# kubectl create secret generic multica-secrets \
#   --namespace=multica \
#   --from-literal=JWT_SECRET=$(openssl rand -hex 32) \
#   --from-literal=DATABASE_URL='postgres://user:pass@rds-host:5432/multica?sslmode=require' \
#   ...
#
# Or edit the stringData block below and `kubectl apply -f secret.yaml`.
apiVersion: v1
kind: Secret
metadata:
  name: multica-secrets
type: Opaque
stringData:
  # --- Session signing (required) ---
  JWT_SECRET: "REPLACE_ME_openssl_rand_hex_32"

  # --- Aliyun RDS PostgreSQL (required) ---
  # Must include sslmode=require for RDS public endpoints; internal VPC
  # endpoints may allow sslmode=disable depending on instance config.
  DATABASE_URL: "postgres://REPLACE_ME:REPLACE_ME@REPLACE_ME.pg.rds.aliyuncs.com:5432/multica?sslmode=require"
  POSTGRES_DB: "multica"
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"

  # --- Feishu OAuth (required if Feishu login is enabled) ---
  FEISHU_APP_SECRET: "REPLACE_ME"

  # --- Feishu Project (Meego) plugin login (optional) ---
  # Required for the /auth/feishu-plugin endpoint used by the Feishu Project
  # plugin iframe. ID + Secret obtained from project.feishu.cn developer console.
  # For multi-plugin deployments, use FEISHU_PROJECT_PLUGINS="ID:secret,ID2:secret2".
  FEISHU_PROJECT_PLUGIN_ID: ""
  FEISHU_PROJECT_PLUGIN_SECRET: ""

  # --- Google OAuth (optional) ---
  GOOGLE_CLIENT_SECRET: ""

  # --- Email (optional — shareable links work without this) ---
  RESEND_API_KEY: ""

  # --- S3 / OSS uploads (optional; leave empty to use local PV) ---
  S3_BUCKET: ""
  S3_REGION: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""

  # --- CloudFront signed cookies (optional) ---
  CLOUDFRONT_KEY_PAIR_ID: ""
  CLOUDFRONT_PRIVATE_KEY: ""
  CLOUDFRONT_DOMAIN: ""

  # --- Product analytics (optional) ---
  POSTHOG_API_KEY: ""
