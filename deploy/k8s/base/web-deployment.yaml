apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-web
  labels:
    app.kubernetes.io/name: multica
    app.kubernetes.io/component: web
spec:
  # Next.js SSR is stateless — scale horizontally. 3 replicas spreads load
  # across AZs and survives node drains without 5xx.
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/component: web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: multica
        app.kubernetes.io/component: web
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: web
          image: lilith-registry.cn-shanghai.cr.aliyuncs.com/devops/multica-web:v0.2.5-token-sync
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          envFrom:
            - configMapRef:
                name: multica-config
            - secretRef:
                name: multica-secrets
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 300m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 1536Mi
          # Matches the Dockerfile's USER nextjs (uid 1001).
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop: ["ALL"]
