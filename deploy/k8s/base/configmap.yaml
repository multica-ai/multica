# ============================================================================
# UPSTREAM-SYNC CAUTION: Lilith-specific values (multica.lilithgames.com URLs,
# FEISHU_APP_ID, CORS origins, Resend sender domain). Upstream has a different
# baseline. On `git merge multica-ai/main` conflicts here resolve as "keep
# ours" by default — DO NOT replace these values with upstream's defaults or
# Feishu/email/CORS will break. Same applies to base/ingress.yaml,
# base/albconfig.yaml.
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: multica-config
data:
  # --- DB pool ---
  # Default pgxpool is 25. At ~500 concurrent users with mixed read/write plus
  # agent task_message writes, 80 lets us hold connections under load and still
  # stay well under the RDS instance's max_connections ceiling.
  DATABASE_MAX_CONNS: "80"
  DATABASE_MIN_CONNS: "10"

  # --- Public HTTP surface ---
  # PORT / FRONTEND_PORT intentionally NOT set here — both the Go server and
  # Next.js respect the same env name `PORT`, so a shared value would collide.
  # Each Deployment sets its own PORT explicitly in spec.containers[].env.
  # Canonical public URL used for OAuth redirect construction and email links.
  # Keep in sync with the Ingress host and the FEISHU_REDIRECT_URI in the Secret.
  #
  # Phase-2 cutover: multica.lilithgames.com is now canonical for all outbound
  # URLs (emails, OAuth redirect, embedded plugin links). ship.lilithgames.com
  # still resolves and 301-redirects to multica via the Ingress. CORS keeps
  # both origins for the brief window where in-flight XHRs from a tab opened
  # before cutover may still send Origin: https://ship.lilithgames.com — the
  # 301 doesn't help XHR (browser CORS preflight is a separate request).
  # PR 3 (cleanup, weeks later) drops ship from CORS once nobody is on it.
  MULTICA_APP_URL: "https://multica.lilithgames.com"
  FRONTEND_ORIGIN: "https://multica.lilithgames.com"
  CORS_ALLOWED_ORIGINS: "https://multica.lilithgames.com,https://ship.lilithgames.com,https://project.feishu.cn,https://projectplg.feishupkg.com"
  # Inside the cluster the frontend talks to the backend over the Service DNS,
  # not via ingress (avoids loopback through ALB, saves latency).
  REMOTE_API_URL: "http://multica-server:8080"

  # --- App env ---
  # "production" disables the 888888 dev master code in email login.
  APP_ENV: "production"
  ALLOW_SIGNUP: "true"
  NEXT_PUBLIC_ALLOW_SIGNUP: "true"

  # --- Email (Resend) ---
  # Leave RESEND_API_KEY empty in the Secret if you don't use email invites;
  # shareable invitation links work without Resend.
  # NOTE: multica.lilithgames.com must have SPF + DKIM + DMARC records set up
  # in Aliyun DNS and the domain verified in Resend BEFORE this cutover, or
  # outbound email goes straight to spam.
  RESEND_FROM_EMAIL: "noreply@multica.lilithgames.com"

  # --- Feishu OAuth (public half) ---
  # NEXT_PUBLIC_FEISHU_APP_ID is baked into the web bundle at build time via
  # .env.production; duplicated here so the backend's os.Getenv path also sees
  # the app_id for logging/routing purposes.
  NEXT_PUBLIC_FEISHU_APP_ID: "cli_a739addb39e41013"
  FEISHU_APP_ID: "cli_a739addb39e41013"
  # Lark app console must list multica callback in the Redirect URI whitelist
  # before this cutover, or the Feishu login flow 4xx's at the OAuth step.
  # Keep ship in the Lark whitelist for a few weeks so the Ingress 301 can
  # graduate any in-flight flows that still reference the old callback.
  FEISHU_REDIRECT_URI: "https://multica.lilithgames.com/auth/feishu/callback"

  # --- Google OAuth (public half, optional) ---
  NEXT_PUBLIC_GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_ID: ""
  # Same Lark-style whitelist note: the Google OAuth client's Authorized
  # redirect URIs list must include multica before this cutover.
  GOOGLE_REDIRECT_URI: "https://multica.lilithgames.com/auth/callback"

  # --- Signup gating (optional; comma-separated) ---
  ALLOWED_EMAIL_DOMAINS: ""
  ALLOWED_EMAILS: ""

  # --- Logging / analytics ---
  POSTHOG_HOST: "https://us.i.posthog.com"
  ANALYTICS_DISABLED: "true"
