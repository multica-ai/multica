apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: multica
resources:
  - namespace.yaml
  - configmap.yaml
  - postgres.yaml
  - backend.yaml
  - frontend.yaml
  - ingress.yaml
# multica-secrets is intentionally excluded — create it out-of-band so real
# values never land in git. See secret.example.yaml.
