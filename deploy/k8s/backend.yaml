apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: multica-backend-uploads
  namespace: multica
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-backend
  namespace: multica
  labels:
    app: multica-backend
spec:
  # The backend entrypoint runs migrations before starting. Keep replicas at 1
  # so two pods don't race on startup migrations.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: multica-backend
  template:
    metadata:
      labels:
        app: multica-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/multica-ai/multica-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: multica-config
            - secretRef:
                name: multica-secrets
          env:
            - name: DATABASE_URL
              value: postgres://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@multica-postgres:5432/$(POSTGRES_DB)?sslmode=disable
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: multica-backend-uploads
---
apiVersion: v1
kind: Service
metadata:
  name: multica-backend
  namespace: multica
spec:
  type: ClusterIP
  selector:
    app: multica-backend
  ports:
    - port: 8080
      targetPort: 8080
      name: http
---
# DNS alias: the multica-web image bakes REMOTE_API_URL=http://backend:8080
# at build time, and Next.js's standalone build does not re-evaluate the
# rewrite destinations from runtime env. This ExternalName makes the bare
# host "backend" resolve to multica-backend inside the cluster, so the
# frontend's /api, /ws, /auth, and /uploads proxies work out of the box.
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: multica
spec:
  type: ExternalName
  externalName: multica-backend.multica.svc.cluster.local
