apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: multica-postgres-data
  namespace: multica
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: multica-postgres
  namespace: multica
  labels:
    app: multica-postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: multica-postgres
  template:
    metadata:
      labels:
        app: multica-postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: multica-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: multica-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: multica-secrets
                  key: POSTGRES_PASSWORD
            # local-path PVCs mount with a lost+found directory — point PGDATA
            # at a subdir so initdb sees an empty target.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: multica-postgres-data
---
apiVersion: v1
kind: Service
metadata:
  name: multica-postgres
  namespace: multica
spec:
  type: ClusterIP
  selector:
    app: multica-postgres
  ports:
    - port: 5432
      targetPort: 5432
