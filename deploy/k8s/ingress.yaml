apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-frontend
  namespace: multica
spec:
  ingressClassName: traefik
  rules:
    - host: multica.dev.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-frontend
                port:
                  number: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-backend
  namespace: multica
spec:
  ingressClassName: traefik
  rules:
    - host: api.multica.dev.lan
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
