# Template for the multica-secrets Secret. DO NOT commit a copy with real
# values — create the Secret out-of-band, e.g.:
#
#   kubectl -n multica create secret generic multica-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=RESEND_API_KEY="" \
#     --from-literal=GOOGLE_CLIENT_SECRET="" \
#     --from-literal=CLOUDFRONT_PRIVATE_KEY="" \
#     --from-literal=MULTICA_DEV_VERIFICATION_CODE=""
#
# Or apply this file after replacing the placeholder values below.
apiVersion: v1
kind: Secret
metadata:
  name: multica-secrets
  namespace: multica
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32"
  POSTGRES_PASSWORD: "REPLACE_WITH_RANDOM_PASSWORD"

  # Optional — leave empty to disable the corresponding feature.
  RESEND_API_KEY: ""
  GOOGLE_CLIENT_SECRET: ""
  CLOUDFRONT_PRIVATE_KEY: ""
  # Set when APP_ENV=development to use a fixed verification code at login.
  # Ignored when APP_ENV=production.
  MULTICA_DEV_VERIFICATION_CODE: ""
