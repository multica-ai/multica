apiVersion: v1
kind: Secret
metadata:
  name: {{ include "multica.secretName" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
type: Opaque
stringData:
  jwt-secret: {{ required "config.jwtSecret is required — generate with: openssl rand -hex 32" .Values.config.jwtSecret | quote }}
  {{- if .Values.postgresql.enabled }}
  postgres-password: {{ .Values.postgresql.auth.postgresPassword | quote }}
  postgres-user-password: {{ .Values.postgresql.auth.password | quote }}
  {{- end }}
  {{- if .Values.config.resend.apiKey }}
  resend-api-key: {{ .Values.config.resend.apiKey | quote }}
  {{- end }}
  {{- if .Values.config.google.clientId }}
  google-client-id: {{ .Values.config.google.clientId | quote }}
  {{- end }}
  {{- if .Values.config.google.clientSecret }}
  google-client-secret: {{ .Values.config.google.clientSecret | quote }}
  {{- end }}
  {{- if .Values.config.s3.accessKeyId }}
  s3-access-key-id: {{ .Values.config.s3.accessKeyId | quote }}
  {{- end }}
  {{- if .Values.config.s3.secretAccessKey }}
  s3-secret-access-key: {{ .Values.config.s3.secretAccessKey | quote }}
  {{- end }}
  {{- if .Values.config.cloudfront.privateKey }}
  cloudfront-private-key: |
{{ .Values.config.cloudfront.privateKey | indent 4 }}
  {{- end }}
