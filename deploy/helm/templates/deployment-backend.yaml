apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.backend.fullname" . }}
  labels:
    {{- include "multica.backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "multica.backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "multica.backend.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.backend.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "multica.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z {{ include "multica.postgres.host" . }} {{ .Values.postgresql.service.port }}; do
                echo "Waiting for postgres at {{ include "multica.postgres.host" . }}:{{ .Values.postgresql.service.port }}..."
                sleep 2
              done
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "multica.backend.image" . }}
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: metrics
              containerPort: 9090
              protocol: TCP
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "multica.configMapName" . }}
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: jwt-secret
            {{- if .Values.postgresql.enabled }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: postgres-user-password
            - name: DATABASE_URL
              value: {{ include "multica.databaseUrl" . | quote }}
            {{- else }}
            - name: DATABASE_URL
              value: {{ required "config.externalDatabaseUrl is required when postgresql.enabled=false" .Values.config.externalDatabaseUrl | quote }}
            {{- end }}
            {{- if .Values.config.resend.apiKey }}
            - name: RESEND_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: resend-api-key
            {{- end }}
            {{- if .Values.config.google.clientId }}
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: google-client-id
            - name: GOOGLE_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: google-client-secret
            {{- end }}
            {{- if .Values.config.s3.accessKeyId }}
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: s3-access-key-id
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: s3-secret-access-key
            {{- end }}
            {{- if .Values.config.cloudfront.privateKey }}
            - name: CLOUDFRONT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "multica.secretName" . }}
                  key: cloudfront-private-key
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "multica.backend.fullname" . }}-uploads
