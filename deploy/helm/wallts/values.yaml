# -----------------------------------------------------------------------------
# Container images
# -----------------------------------------------------------------------------
images:
  backend:
    repository: ghcr.io/dwickyfp/wallts-backend
    # Empty defaults to Chart.appVersion. Released OCI charts set appVersion to
    # the Git tag (for example v0.3.5), so installs use matching app images.
    tag: ""
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/dwickyfp/wallts-web
    # Empty defaults to Chart.appVersion. Set explicitly to override.
    tag: ""
    pullPolicy: IfNotPresent
  postgres:
    repository: pgvector/pgvector
    tag: pg17
    pullPolicy: IfNotPresent

# -----------------------------------------------------------------------------
# Pre-created Secret with sensitive values. Create it before `helm install`:
#
#   kubectl -n <namespace> create secret generic wallts-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=RESEND_API_KEY="" \
#     --from-literal=GOOGLE_CLIENT_SECRET="" \
#     --from-literal=CLOUDFRONT_PRIVATE_KEY="" \
#     --from-literal=WALLTS_DEV_VERIFICATION_CODE=""
#
# The chart references this Secret by name; it does not template it, so real
# values never need to land in git.
# -----------------------------------------------------------------------------
existingSecret: wallts-secrets

# -----------------------------------------------------------------------------
# PostgreSQL
#
# By default the chart deploys a bundled pgvector instance. Set
#   --set postgresql.enabled=false
# to disable it and point at an external database instead.
#
# When using an external database, supply the full connection string via
# postgresql.external.databaseUrl (or set DATABASE_URL in the existingSecret).
# -----------------------------------------------------------------------------
postgresql:
  enabled: true
  database: wallts
  user: wallts
  persistence:
    size: 10Gi
    # Leave empty to use the cluster's default StorageClass.
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  # External database settings (only used when postgresql.enabled=false).
  external:
    # Full PostgreSQL connection URL. Examples:
    #   postgres://user:pass@host:5432/dbname?sslmode=require
    databaseUrl: ""

# -----------------------------------------------------------------------------
# Backend (Go API + WS server)
# -----------------------------------------------------------------------------
backend:
  replicas: 1
  uploads:
    persistence:
      size: 5Gi
      storageClass: ""
  # All non-secret backend env. Secret values come from `existingSecret`.
  config:
    appEnv: production
    appUrl: http://wallts.dev.lan
    frontendOrigin: http://wallts.dev.lan
    corsAllowedOrigins: ""
    cookieDomain: ""
    resendFromEmail: noreply@wallts.ai
    allowSignup: true
    allowedEmails: ""
    allowedEmailDomains: ""
    # Self-host gate (#3433): set true to make POST /api/workspaces 403 for
    # every caller. Bootstrap the workspace with this false, then flip to
    # true so users can only join via invitation.
    disableWorkspaceCreation: false
    googleClientId: ""
    googleRedirectUri: http://wallts.dev.lan/auth/callback
    s3Bucket: ""
    s3Region: us-west-2
    cloudfrontDomain: ""
    cloudfrontKeyPairId: ""
    localUploadBaseUrl: http://api.wallts.dev.lan
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# -----------------------------------------------------------------------------
# Frontend (Next.js standalone)
#
# The wallts-web image bakes REMOTE_API_URL=http://backend:8080 at build time;
# the chart ships an ExternalName Service named "backend" so that bare host
# resolves to the in-cluster backend Service.
# -----------------------------------------------------------------------------
frontend:
  replicas: 1
  # Compatibility shim for the prebuilt wallts-web image.
  compatibility:
    # When true (default) the chart creates an ExternalName Service literally
    # named "backend" so the REMOTE_API_URL=http://backend:8080 baked into the
    # web image resolves in-cluster. Because that name is unprefixed, only ONE
    # release of this chart can run per namespace, and it will collide with any
    # pre-existing Service/backend (helm install then fails without
    # --take-ownership). Set to false if you run a web image built with a
    # patched REMOTE_API_URL and don't need the alias.
    backendAlias: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

# -----------------------------------------------------------------------------
# Ingress
# -----------------------------------------------------------------------------
ingress:
  enabled: true
  className: traefik
  annotations: {}
  frontend:
    host: wallts.dev.lan
  backend:
    host: api.wallts.dev.lan
  # tls:
  #   - hosts: [wallts.dev.lan, api.wallts.dev.lan]
  #     secretName: wallts-tls
