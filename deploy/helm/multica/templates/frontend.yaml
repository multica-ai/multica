{{- $frontendImageTag := default .Chart.AppVersion .Values.images.frontend.tag -}}
{{- $remoteApiUrl := default (printf "http://%s:8080" (include "multica.backend.fullname" .)) .Values.frontend.config.remoteApiUrl -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.frontend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "multica.labels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.images.frontend.repository }}:{{ $frontendImageTag }}"
          imagePullPolicy: {{ .Values.images.frontend.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: PORT
              value: "3000"
            - name: REMOTE_API_URL
              value: {{ $remoteApiUrl | quote }}
            {{- if .Values.frontend.config.docsUrl }}
            - name: DOCS_URL
              value: {{ .Values.frontend.config.docsUrl | quote }}
            {{- end }}
            {{- if .Values.frontend.config.publicApiUrl }}
            - name: NEXT_PUBLIC_API_URL
              value: {{ .Values.frontend.config.publicApiUrl | quote }}
            {{- end }}
            {{- if .Values.frontend.config.publicWsUrl }}
            - name: NEXT_PUBLIC_WS_URL
              value: {{ .Values.frontend.config.publicWsUrl | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.frontend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: frontend
  ports:
    - port: 3000
      targetPort: 3000
      name: http
