{{- if .Values.backend.uploads.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "multica.backend.fullname" . }}-uploads
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  accessModes:
    {{- toYaml .Values.backend.uploads.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.backend.uploads.persistence.size | quote }}
  {{- with .Values.backend.uploads.persistence.storageClass }}
  storageClassName: {{ . | quote }}
  {{- end }}
---
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "multica.backend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: {{ .Values.backend.revisionHistoryLimit }}
  strategy:
    {{- toYaml .Values.backend.strategy | nindent 4 }}
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      {{- $systemAnnotations := dict
        "checksum/config" (include (print $.Template.BasePath "/configmap.yaml") . | sha256sum)
        "checksum/secret" ((lookup "v1" "Secret" .Release.Namespace .Values.existingSecret).data | toYaml | sha256sum)
      -}}
      {{- $podAnnotations := mergeOverwrite (deepCopy (default dict .Values.backend.podAnnotations)) $systemAnnotations }}
      annotations:
        {{- toYaml $podAnnotations | nindent 8 }}
      labels:
        {{- include "multica.podLabels" (dict "root" . "component" "backend" "custom" .Values.backend.podLabels) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "multica.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: {{ include "multica.backend.image" . | quote }}
          imagePullPolicy: {{ .Values.images.backend.pullPolicy }}
          {{- with .Values.backend.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - containerPort: 8080
              name: http
            {{- if .Values.backend.metrics.enabled }}
            - containerPort: {{ .Values.backend.metrics.containerPort }}
              name: metrics
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
            - secretRef:
                name: {{ .Values.existingSecret }}
            {{- range .Values.backend.extraEnvFrom }}
            {{- if not (and .secretRef (eq .secretRef.name $.Values.existingSecret)) }}
            {{- toYaml (list .) | nindent 12 }}
            {{- end }}
            {{- end }}
          {{- if or (not .Values.postgres.external.enabled) .Values.backend.extraEnv }}
          env:
            {{- if not .Values.postgres.external.enabled }}
            - name: DATABASE_URL
              value: {{ include "multica.databaseUrl" . | quote }}
            {{- end }}
            {{- with .Values.backend.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if or .Values.backend.uploads.persistence.enabled .Values.backend.extraVolumeMounts }}
          volumeMounts:
            {{- if .Values.backend.uploads.persistence.enabled }}
            - name: uploads
              mountPath: /app/data/uploads
            {{- end }}
            {{- with .Values.backend.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if .Values.backend.startupProbe.enabled }}
          startupProbe:
            {{- toYaml (omit .Values.backend.startupProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.backend.readinessProbe.enabled }}
          readinessProbe:
            {{- toYaml (omit .Values.backend.readinessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- if .Values.backend.livenessProbe.enabled }}
          livenessProbe:
            {{- toYaml (omit .Values.backend.livenessProbe "enabled") | nindent 12 }}
          {{- end }}
          {{- with .Values.backend.lifecycle }}
          lifecycle:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
      {{- with .Values.backend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.backend.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.backend.uploads.persistence.enabled .Values.backend.extraVolumes }}
      volumes:
        {{- if .Values.backend.uploads.persistence.enabled }}
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "multica.backend.fullname" . }}-uploads
        {{- end }}
        {{- with .Values.backend.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.backend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - port: 8080
      targetPort: http
      name: http
{{- if .Values.backend.metrics.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "multica.backend.fullname" . }}-metrics
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-metrics
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: multica
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: backend
  ports:
    - port: {{ .Values.backend.metrics.servicePort }}
      targetPort: metrics
      name: metrics
{{- end }}
{{- if .Values.frontend.compatibility.backendAlias }}
---
# Compatibility alias for the REMOTE_API_URL=http://backend:8080 baked into
# released frontend images. It limits the chart to one release per namespace.
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend-alias
spec:
  type: ExternalName
  externalName: {{ printf "%s.%s.svc.cluster.local" (include "multica.backend.fullname" .) .Release.Namespace }}
{{- end }}
