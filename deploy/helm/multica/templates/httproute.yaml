{{- if .Values.httpRoute.enabled -}}
{{- $frontendAnnotations := mergeOverwrite (deepCopy (default dict .Values.httpRoute.annotations)) (default dict .Values.httpRoute.frontend.annotations) -}}
{{- $backendAnnotations := mergeOverwrite (deepCopy (default dict .Values.httpRoute.annotations)) (default dict .Values.httpRoute.backend.annotations) -}}
{{- $frontendParentRefs := default .Values.httpRoute.parentRefs .Values.httpRoute.frontend.parentRefs -}}
{{- $backendParentRefs := default .Values.httpRoute.parentRefs .Values.httpRoute.backend.parentRefs -}}
{{- if and .Values.httpRoute.frontend.enabled .Values.httpRoute.backend.enabled (deepEqual $frontendParentRefs $backendParentRefs) (empty .Values.httpRoute.frontend.rules) (empty .Values.httpRoute.backend.rules) -}}
  {{- if and (empty .Values.httpRoute.frontend.hostnames) (empty .Values.httpRoute.backend.hostnames) -}}
    {{- fail "httpRoute frontend and backend cannot both use catch-all hostnames with default rules on the same parentRefs; configure distinct hostnames, custom rules, or component parentRefs" -}}
  {{- end -}}
  {{- range $hostname := .Values.httpRoute.frontend.hostnames -}}
    {{- if has $hostname $.Values.httpRoute.backend.hostnames -}}
      {{- fail (printf "httpRoute frontend and backend cannot both use hostname %q with default rules on the same parentRefs" $hostname) -}}
    {{- end -}}
  {{- end -}}
{{- end -}}
{{- if .Values.httpRoute.frontend.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "multica.frontend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  {{- with $frontendAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml $frontendParentRefs | nindent 4 }}
  {{- with .Values.httpRoute.frontend.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.frontend.rules }}
    {{- toYaml .Values.httpRoute.frontend.rules | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "multica.frontend.fullname" . }}
          port: 3000
    {{- end }}
{{- end }}
{{- if and .Values.httpRoute.frontend.enabled .Values.httpRoute.backend.enabled }}
---
{{- end }}
{{- if .Values.httpRoute.backend.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "multica.backend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
  {{- with $backendAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml $backendParentRefs | nindent 4 }}
  {{- with .Values.httpRoute.backend.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if .Values.httpRoute.backend.rules }}
    {{- toYaml .Values.httpRoute.backend.rules | nindent 4 }}
    {{- else }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "multica.backend.fullname" . }}
          port: 8080
    {{- end }}
{{- end }}
{{- end }}
