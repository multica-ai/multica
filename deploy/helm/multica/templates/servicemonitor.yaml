{{- if and .Values.backend.metrics.enabled .Values.monitoring.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "multica.backend.fullname" . }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
    {{- with .Values.monitoring.serviceMonitor.additionalLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: multica
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: backend-metrics
  endpoints:
    - port: {{ .Values.monitoring.serviceMonitor.port | quote }}
      path: {{ .Values.monitoring.serviceMonitor.path | quote }}
      interval: {{ .Values.monitoring.serviceMonitor.interval | quote }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout | quote }}
{{- end }}
