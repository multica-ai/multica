# Container images. A digest takes precedence over tag; an empty application
# tag falls back to Chart.appVersion.
images:
  backend:
    repository: ghcr.io/multica-ai/multica-backend
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  frontend:
    repository: ghcr.io/multica-ai/multica-web
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent
  postgres:
    repository: pgvector/pgvector
    tag: pg17
    digest: ""
    pullPolicy: IfNotPresent

# References to registry credentials used by every workload.
imagePullSecrets: []

# Pre-created Secret loaded by the backend and built-in PostgreSQL. The chart
# never creates or stores secret values. Depending on enabled integrations it
# may contain: JWT_SECRET, DATABASE_URL, REDIS_URL, SMTP_USERNAME,
# SMTP_PASSWORD, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN,
# RESEND_API_KEY, GOOGLE_CLIENT_SECRET, CLOUDFRONT_PRIVATE_KEY,
# GITHUB_WEBHOOK_SECRET, GITHUB_APP_PRIVATE_KEY and MULTICA_LLM_API_KEY.
# Built-in PostgreSQL additionally needs POSTGRES_PASSWORD. Only the relevant
# keys are required.
existingSecret: multica-secrets

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

# PostgreSQL (pgvector). Set external.enabled=true and provide DATABASE_URL in
# existingSecret to skip the built-in Deployment, PVC, and Service.
postgres:
  external:
    enabled: false
  database: multica
  user: multica
  persistence:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  podSecurityContext: {}
  containerSecurityContext: {}
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  podAnnotations: {}
  podLabels: {}

# Backend (Go API and WebSocket server).
backend:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: Recreate
  terminationGracePeriodSeconds: 60
  lifecycle: {}
  uploads:
    persistence:
      # Disable when S3 is configured, or use a ReadWriteMany StorageClass for
      # multiple backend replicas that still use local uploads.
      enabled: true
      size: 5Gi
      storageClass: ""
      accessModes:
        - ReadWriteOnce
  config:
    appEnv: production
    appUrl: http://multica.dev.lan
    publicUrl: ""
    frontendOrigin: http://multica.dev.lan
    corsAllowedOrigins: ""
    allowedOrigins: ""
    cookieDomain: ""
    # null preserves pool_max_conns and pool_min_conns from DATABASE_URL.
    # Set these explicitly to override the connection-string values.
    databaseMaxConns: null
    databaseMinConns: null
    logLevel: info
    metricsAddr: ""
    analyticsDisabled: true
    # Must be shorter than terminationGracePeriodSeconds after allowing time
    # for the server's remaining graceful shutdown work.
    shutdownHoldDuration: ""
    resendFromEmail: noreply@multica.ai
    allowSignup: true
    allowedEmails: ""
    allowedEmailDomains: ""
    disableWorkspaceCreation: false
    googleClientId: ""
    googleRedirectUri: http://multica.dev.lan/auth/callback
    smtp:
      host: ""
      # Defaults match the application when SMTP_PORT and SMTP_TLS are unset.
      port: 25
      fromEmail: ""
      tls: ""
      tlsInsecure: false
      ehloName: ""
    redis:
      disableClientName: false
    rateLimit:
      auth: 5
      authVerify: 20
      trustedProxies: ""
    trustedProxies: ""
    s3Bucket: ""
    s3Region: us-west-2
    s3EndpointUrl: ""
    # null leaves application auto-detection in control.
    s3UsePathStyle: null
    attachmentDownloadMode: auto
    attachmentDownloadUrlTtl: 30m
    cloudfrontDomain: ""
    cloudfrontKeyPairId: ""
    localUploadBaseUrl: http://api.multica.dev.lan
  extraEnv: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  startupProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    failureThreshold: 30
    periodSeconds: 10
  readinessProbe:
    enabled: true
    httpGet:
      path: /readyz
      port: http
    initialDelaySeconds: 10
    periodSeconds: 10
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 30
  metrics:
    enabled: false
    containerPort: 9090
    servicePort: 9090
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  podAnnotations: {}
  podLabels: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

# Frontend (Next.js standalone).
frontend:
  replicas: 1
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
  config:
    # Backend origin used by the frontend runtime proxy for /api, /auth,
    # /uploads, and /ws. Empty defaults to this release's backend Service.
    remoteApiUrl: ""
    # Optional docs origin used by the frontend runtime proxy for /docs.
    docsUrl: ""
    # Optional browser-visible split-origin overrides. Leave empty for the
    # default same-origin frontend proxy.
    publicApiUrl: ""
    publicWsUrl: ""
  # Compatibility shim for legacy multica-web images built before runtime
  # URL rewrites. New images do not need this unprefixed Service.
  compatibility:
    # When true the chart creates an ExternalName Service literally named
    # "backend" for old images that baked REMOTE_API_URL=http://backend:8080.
    # Because that name is unprefixed, only ONE such release can run per
    # namespace. Keep false for current images.
    backendAlias: false
  extraVolumes: []
  extraVolumeMounts: []
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  nodeSelector: {}
  affinity: {}
  tolerations: []
  topologySpreadConstraints: []
  podAnnotations: {}
  podLabels: {}
  podDisruptionBudget:
    enabled: false
    minAvailable: 1

ingress:
  enabled: true
  className: traefik
  annotations: {}
  frontend:
    host: multica.dev.lan
    annotations: {}
  backend:
    host: api.multica.dev.lan
    annotations: {}
  tls: []

# Gateway API HTTPRoutes. The Gateway and its listeners must already exist.
# Disable ingress.enabled when HTTPRoute should be the only public entrypoint.
httpRoute:
  enabled: false
  annotations: {}
  # Existing Gateway used by both routes. namespace is optional when the
  # Gateway is in the release namespace; sectionName selects a listener.
  parentRefs: []
  # - name: internal-gateway
  #   namespace: gateway-system
  #   sectionName: https
  frontend:
    enabled: true
    annotations: {}
    # Optional component override; empty inherits httpRoute.parentRefs.
    parentRefs: []
    hostnames: []
    # Empty uses a PathPrefix / rule targeting the chart frontend Service.
    rules: []
  backend:
    enabled: true
    annotations: {}
    # Optional component override; empty inherits httpRoute.parentRefs.
    parentRefs: []
    hostnames: []
    # Empty uses a PathPrefix / rule targeting the chart backend Service.
    rules: []

# The chart renders these rules verbatim. When enabled, empty rule lists deny
# traffic in that direction; provide every rule required by the deployment.
networkPolicy:
  enabled: false
  ingress:
    frontend: []
    backend: []
    postgres: []
  egress:
    frontend: []
    backend: []
    postgres: []

monitoring:
  serviceMonitor:
    enabled: false
    additionalLabels: {}
    interval: 30s
    scrapeTimeout: 10s
    path: /metrics
    port: metrics
  prometheusRule:
    enabled: false
    additionalLabels: {}
    samplerQueryErrorsFor: 5m
    samplerQueryLatencyFor: 10m
    severity: warning
