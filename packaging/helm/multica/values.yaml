# Default values for the multica chart.
# Operators DO NOT edit this file. Per-deployment overrides go in
# ~/kube/apps/multica/values.yaml and are passed to helm via -f.

# ── Networking ─────────────────────────────────────────────
hostname: multica.example.com

ingress:
  enabled: true
  className: nginx
  annotations: {}
  tls:
    enabled: true
    secretName: multica-tls
  # Optional LAN-only .local hostname for development before the public
  # ingress (Cloudflare tunnel etc.) is wired. external-mdns publishes the
  # hostname automatically; HTTP only (no Let's Encrypt for .local).
  local:
    enabled: false
    hostname: multica.local

# ── Images ─────────────────────────────────────────────────
image:
  registry: ghcr.io/example
  pullSecret: ghcr-secret
  tag: v0.0.0
  tags:
    backend: ""
    web: ""
    postgres: ""
    controller: ""
    repoCache: ""
    runtimeClaude: ""
  pullPolicy: IfNotPresent

# ── Control plane subsystem ────────────────────────────────
platform:
  enabled: true

  backend:
    replicaCount: 1
    appEnv: production
    allowSignup: true
    cookieDomain: ""
    publicUrl: ""
    trustedProxies: ""
    jwtSecretName: multica-jwt
    # How long a login lasts before re-authentication. Go duration string
    # (e.g. "720h" = 30 days, "87600h" ≈ 10 years) or integer seconds. Empty
    # uses the server default of 30 days. There is no sliding renewal, so the
    # clock starts at login. A long value means "log in once and stay in".
    authTokenTtl: ""
    uploads:
      size: 10Gi
      storageClass: ""
    resend:
      apiKeySecretName: ""
      fromEmail: "noreply@multica.ai"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1,    memory: 1Gi }

  web:
    replicaCount: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 768Mi }

  postgres:
    enabled: true
    storageClass: ""
    size: 20Gi
    secretName: multica-postgres
    user: multica
    database: multica
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 2,    memory: 2Gi }
    # externalUrl: postgres://user:pass@host:5432/db?sslmode=require

# ── Execution subsystem ────────────────────────────────────
runtime:
  enabled: false
  mode: daemon            # daemon (Plan C interim) | controller (Plan D)

  # Internal backend URL — MUST be the in-cluster service, not the public
  # hostname (which is Cloudflare-Access-gated).
  serverUrl: http://multica-backend.multica.svc:8080

  tokenSecretName: multica-token
  gitSshSecretName: multica-git-ssh

  # The single watched workspace for the daemon-mode runtime.
  workspaceId: ""

  daemon:
    replicaCount: 1
    deviceName: multica-cluster
    maxConcurrentTasks: 2
    image: { name: multica-runtime-claude, tag: "" }   # tag "" → falls back to image.tag
    agent:
      provider: claude
      auth: oauth                       # oauth | apiKey
      oauthSecretName: multica-claude-oauth
      apiKeySecretName: ""
      apiKeySecretKey: ANTHROPIC_API_KEY
      model: ""
      extraArgs: ""
    workspacesRoot: /work
    # Git identity for commits made by agents in this runtime. When set, env
    # vars (GIT_AUTHOR_*/GIT_COMMITTER_*) override any per-task identity the
    # daemon configures — every commit comes from the operator, the agent
    # gets credited via the workspace's Co-Authored-By trailer (if enabled).
    # signing.enabled also adds SSH-signing config so commits land "Verified"
    # — the gitSshSecretName key must additionally be registered on GitHub
    # as a Signing Key (separate slot from Authentication Key, same key).
    git:
      authorName: ""
      authorEmail: ""
      signing:
        enabled: false
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 4Gi }

# ── Bootstrap helpers (Plan E fills this) ──────────────────
bootstrap:
  enabled: false
  tokenRotator:
    enabled: false
    schedule: "0 4 * * 0"
  toolCacheGc:
    enabled: false
    schedule: "0 2 1 * *"
