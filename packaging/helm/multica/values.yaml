# Default values for the multica chart.
# Operators DO NOT edit this file. Per-deployment overrides go in
# ~/kube/apps/multica/values.yaml and are passed to helm via -f.

# ── Networking ─────────────────────────────────────────────
hostname: multica.example.com

ingress:
  enabled: true
  className: nginx
  annotations: {}
  tls:
    enabled: true
    secretName: multica-tls
  # Optional LAN-only .local hostname for development before the public
  # ingress (Cloudflare tunnel etc.) is wired. external-mdns publishes the
  # hostname automatically; HTTP only (no Let's Encrypt for .local).
  local:
    enabled: false
    hostname: multica.local

# ── Images ─────────────────────────────────────────────────
image:
  registry: ghcr.io/example
  pullSecret: ghcr-secret
  tag: v0.0.0
  tags:
    backend: ""
    web: ""
    postgres: ""
    controller: ""
    repoCache: ""
    runtimeClaude: ""
  pullPolicy: IfNotPresent

# ── Control plane subsystem ────────────────────────────────
platform:
  enabled: true

  backend:
    replicaCount: 1
    appEnv: production
    allowSignup: true
    cookieDomain: ""
    publicUrl: ""
    trustedProxies: ""
    jwtSecretName: multica-jwt
    uploads:
      size: 10Gi
      storageClass: ""
    resend:
      apiKeySecretName: ""
      fromEmail: "noreply@multica.ai"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1,    memory: 1Gi }

  web:
    replicaCount: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 768Mi }

  postgres:
    enabled: true
    storageClass: ""
    size: 20Gi
    secretName: multica-postgres
    user: multica
    database: multica
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 2,    memory: 2Gi }
    # externalUrl: postgres://user:pass@host:5432/db?sslmode=require

# ── Execution subsystem (Plan D fills this) ────────────────
runtime:
  enabled: false

# ── Bootstrap helpers (Plan E fills this) ──────────────────
bootstrap:
  enabled: false
  tokenRotator:
    enabled: false
    schedule: "0 4 * * 0"
  toolCacheGc:
    enabled: false
    schedule: "0 2 1 * *"
