# Default values for the multica chart.
# Operators DO NOT edit this file. Per-deployment overrides go in
# ~/kube/apps/multica/values.yaml and are passed to helm via -f.

# ── Networking ─────────────────────────────────────────────
hostname: multica.example.com

ingress:
  enabled: true
  className: nginx
  annotations: {}
  tls:
    enabled: true
    secretName: multica-tls
  # Optional LAN-only .local hostname for development before the public
  # ingress (Cloudflare tunnel etc.) is wired. external-mdns publishes the
  # hostname automatically; HTTP only (no Let's Encrypt for .local).
  local:
    enabled: false
    hostname: multica.local

# ── Images ─────────────────────────────────────────────────
image:
  registry: ghcr.io/example
  pullSecret: ghcr-secret
  tag: v0.0.0
  tags:
    backend: ""
    web: ""
    postgres: ""
    controller: ""
    repoCache: ""
    runtimeClaude: ""
  pullPolicy: IfNotPresent

# ── Control plane subsystem ────────────────────────────────
platform:
  enabled: true

  backend:
    replicaCount: 1
    appEnv: production
    allowSignup: true
    cookieDomain: ""
    publicUrl: ""
    trustedProxies: ""
    # Override the Claude OAuth broker URL the backend proxies plan-usage from.
    # Empty → defaults to the in-cluster admin service http://multica-claude-broker:8080
    # when runtime.claudeBroker.enabled. Only relevant in controller mode.
    claudeBrokerUrl: ""
    jwtSecretName: multica-jwt
    # How long a login lasts before re-authentication. Go duration string
    # (e.g. "720h" = 30 days, "87600h" ≈ 10 years) or integer seconds. Empty
    # uses the server default of 30 days. There is no sliding renewal, so the
    # clock starts at login. A long value means "log in once and stay in".
    authTokenTtl: ""
    uploads:
      size: 10Gi
      storageClass: ""
    resend:
      apiKeySecretName: ""
      fromEmail: "noreply@multica.ai"
    resources:
      requests: { cpu: 200m, memory: 256Mi }
      limits:   { cpu: 1,    memory: 1Gi }

  web:
    replicaCount: 1
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 500m, memory: 768Mi }

  postgres:
    enabled: true
    storageClass: ""
    size: 20Gi
    secretName: multica-postgres
    user: multica
    database: multica
    resources:
      requests: { cpu: 200m, memory: 512Mi }
      limits:   { cpu: 2,    memory: 2Gi }
    # externalUrl: postgres://user:pass@host:5432/db?sslmode=require

# ── Execution subsystem ────────────────────────────────────
runtime:
  enabled: false
  mode: daemon            # daemon (Plan C interim) | controller (Plan D)

  # Internal backend URL — MUST be the in-cluster service, not the public
  # hostname (which is Cloudflare-Access-gated).
  serverUrl: http://multica-backend.multica.svc:8080

  tokenSecretName: multica-token
  gitSshSecretName: multica-git-ssh

  # Optional cluster-wide GitHub PAT for the `gh` CLI inside agent pods.
  # When set, GH_TOKEN is injected from this Secret (key "token") into both
  # daemon-mode and controller-mode worker pods. Leave "" to skip — `gh`
  # simply won't be usable, the rest of the runtime is unaffected. Create
  # the Secret out-of-band; the chart never templates a token value.
  githubTokenSecretName: ""
  githubTokenSecretKey: token

  # Optional cluster-wide Cloudflare credentials for agent pods. When enabled,
  # the named K8s Secret's keys are injected as env vars into both daemon-mode
  # and controller-mode worker pods, so `wrangler` (Cloudflare API / R2 bucket
  # ops) and `rclone` (S3-compatible R2 object sync) — both baked into the
  # runtime image — work out of the box.
  #
  # The Secret itself is NOT templated by this chart. Either create it by hand
  # or, with External Secrets Operator installed, set externalSecret.enabled to
  # have the chart render an ExternalSecret that syncs it from Vault.
  #
  # `env` maps each pod env var to a key in the Secret. Defaults assume a Vault
  # KV entry with keys api-token / access-key-id / secret-access-key /
  # s3-api-endpoint and wire the conventional names each tool reads:
  #   - wrangler            → CLOUDFLARE_API_TOKEN
  #   - aws CLI / SDK v2    → AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
  #                           AWS_ENDPOINT_URL_S3
  #   - rclone S3 backend   → credentials via AWS_* (with `--s3-env-auth`),
  #                           endpoint via RCLONE_S3_ENDPOINT (rclone does NOT
  #                           read AWS_ENDPOINT_URL_S3, hence the separate var)
  # Override `env` to rename or add variables (e.g. CLOUDFLARE_ACCOUNT_ID for
  # wrangler r2 ops, or RCLONE_S3_ACCESS_KEY_ID/_SECRET_ACCESS_KEY if you'd
  # rather drive rclone purely from RCLONE_S3_* instead of `--s3-env-auth`).
  cloudflare:
    enabled: false
    secretName: multica-cloudflare
    env:
      - name: CLOUDFLARE_API_TOKEN
        secretKey: api-token
      - name: AWS_ACCESS_KEY_ID
        secretKey: access-key-id
      - name: AWS_SECRET_ACCESS_KEY
        secretKey: secret-access-key
      - name: AWS_ENDPOINT_URL_S3
        secretKey: s3-api-endpoint
      - name: RCLONE_S3_ENDPOINT
        secretKey: s3-api-endpoint
    # Optional: sync the Secret from Vault via External Secrets Operator.
    # Requires ESO + a (Cluster)SecretStore that can read the Vault path. The
    # chart renders an ExternalSecret that materializes `secretName` above.
    externalSecret:
      enabled: false
      # Name of the (Cluster)SecretStore ESO uses to reach Vault.
      secretStoreRef:
        name: vault-backend
        kind: ClusterSecretStore
      # Vault KV v2 path holding the credential keys (no leading "secret/data/"
      # mount prefix — ESO's vault provider adds it per its mountPath config).
      remotePath: cloudflare/multica-agent
      refreshInterval: 1h

  # The single watched workspace for the daemon-mode runtime.
  workspaceId: ""

  daemon:
    replicaCount: 1
    deviceName: multica-cluster
    maxConcurrentTasks: 2
    image: { name: multica-runtime-claude, tag: "" }   # tag "" → falls back to image.tag
    agent:
      provider: claude
      auth: oauth                       # oauth | apiKey
      oauthSecretName: multica-claude-oauth
      apiKeySecretName: ""
      apiKeySecretKey: ANTHROPIC_API_KEY
      model: ""
      extraArgs: ""
    workspacesRoot: /work
    # Git identity for commits made by agents in this runtime. When set, env
    # vars (GIT_AUTHOR_*/GIT_COMMITTER_*) override any per-task identity the
    # daemon configures — every commit comes from the operator, the agent
    # gets credited via the workspace's Co-Authored-By trailer (if enabled).
    # signing.enabled also adds SSH-signing config so commits land "Verified"
    # — the gitSshSecretName key must additionally be registered on GitHub
    # as a Signing Key (separate slot from Authentication Key, same key).
    git:
      authorName: ""
      authorEmail: ""
      signing:
        enabled: false
    resources:
      requests: { cpu: 500m, memory: 1Gi }
      limits:   { cpu: 2,    memory: 4Gi }

  controller:
    replicaCount: 1
    image: { name: multica-controller, tag: "" }   # "" → falls back to image.tag
    pollInterval: 3s
    heartbeatInterval: 15s
    workdir:
      storageClass: ""
      size: 5Gi
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits:   { cpu: 500m, memory: 256Mi }

  # ── Worker pod identity + cluster API access ─────────────────────────────
  # Each agent runtime can independently pick a "worker profile" that controls
  # what (if any) cluster API access its Job pods have. Profiles defined here
  # produce a ServiceAccount + bindings; workspaces reference a profile by name
  # via runtime.workspaces[].workerProfile. A workspace with no workerProfile
  # gets the namespace default SA → no cluster API access.
  #
  # Examples:
  #   runtime.workspaces:
  #     - id: ws-1
  #       agentName: claude-k8s          # full cluster-admin
  #       workerProfile: k8s-admin
  #     - id: ws-1
  #       agentName: claude-vanilla      # no K8S access at all
  worker:
    profiles:
      # Built-in profile: full cluster-admin. Any workspace that picks this
      # profile gets a SA bound to the cluster-admin ClusterRole. DANGEROUS in
      # shared / multi-tenant clusters — any compromised agent task can destroy
      # anything. Use only for agents you trust like your laptop.
      k8s-admin:
        serviceAccountName: multica-runtime-worker-k8s-admin
        rbac:
          enabled: true
          clusterAdmin: true
          targetNamespaces: []
          extraRules: []
          extraClusterRules: []
      # Add your own profiles below. Example: a "deploy-only" profile scoped
      # to one namespace.
      #
      # deploy-only:
      #   serviceAccountName: multica-runtime-worker-deploy
      #   rbac:
      #     enabled: true
      #     clusterAdmin: false
      #     targetNamespaces: [apps]
      #     extraRules: []
      #     extraClusterRules: []

  # ── In-cluster repo cache (Plan F.1) ──────────────────────────────────────
  # Long-lived Deployment that maintains bare clones of every workspace's repos
  # on an RWX PVC. Worker Job pods mount the same PVC read-only and `git clone`
  # locally via a per-task gitconfig with url.<base>.insteadOf rewrites. Cuts
  # cold-clone time from 5-15s to sub-second.
  repocache:
    enabled: true
    replicaCount: 1
    image: { name: multica-repocache, tag: "" }   # "" → falls back to image.tag
    storage:
      storageClass: ""                  # MUST be RWX-capable
      accessMode: ReadWriteMany
      size: 20Gi
    fetchInterval: 60s
    resources:
      requests: { cpu: 100m, memory: 256Mi }
      limits:   { cpu: 1,    memory: 1Gi }

  # ── Claude OAuth broker (in-cluster refresh token holder) ────────────────
  # Owns the canonical Anthropic OAuth state and serves the current bearer
  # to worker Job pods via /access_token. Eliminates the concurrent-refresh
  # race that caused #15.A. See server/cmd/multica-claude-broker/ and the
  # design notes in the broker plan.
  claudeBroker:
    enabled: false
    replicaCount: 1
    image: { name: multica-claude-broker, tag: "" }   # "" → falls back to image.tag
    refreshPad: 5m         # refresh when expires_at - now < refreshPad
    refreshInterval: 60s   # how often the refresh loop ticks
    leaseName: multica-claude-broker-refresh    # coordination.k8s.io/Lease for leader election
    secretName: multica-claude-oauth-broker     # the broker's own state secret (3 keys: access, refresh, expires_at)
    accessTokenSecret: multica-claude-broker-access-token  # mirror secret consumed by worker pods (1 key: access_token)
    bootstrapFromSecret: multica-claude-oauth   # one-time conversion source (the old tarball Secret)
    resources:
      requests: { cpu: 50m,  memory: 64Mi }
      limits:   { cpu: 200m, memory: 128Mi }
    networkPolicy:
      enabled: true
      # Pod- or namespace-selector(s) that should be allowed to scrape /metrics.
      # Leave empty to expose metrics only to controller-managed pods (which
      # don't scrape). Typical: a Prometheus or Grafana Agent namespace.
      # Example:
      #   metricsFrom:
      #     - namespaceSelector:
      #         matchLabels: { kubernetes.io/metadata.name: monitoring }
      metricsFrom: []

# ── Bootstrap helpers (Plan E fills this) ──────────────────
bootstrap:
  enabled: false
  tokenRotator:
    enabled: false
    schedule: "0 4 * * 0"
  toolCacheGc:
    enabled: false
    schedule: "0 2 1 * *"
