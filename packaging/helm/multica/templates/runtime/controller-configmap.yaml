{{- if and .Values.runtime.enabled (eq .Values.runtime.mode "controller") }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: multica-controller-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "controller" "ctx" .) | nindent 4 }}
data:
  runtime.yaml: |
    workspaces:
{{- $profiles := default (dict) .Values.runtime.worker.profiles }}
{{- range $w := default (list (dict "id" .Values.runtime.workspaceId)) (default list .Values.runtime.workspaces) }}
{{- /*
Resolve the workspace's workerProfile → ServiceAccount name. An unset profile
(or one not present in runtime.worker.profiles) yields an empty SA, which the
controller passes through to PodSpec.ServiceAccountName — pods run as the
namespace `default` SA with no cluster API access. This is the intended "agent
without K8S access" path.
*/ -}}
{{- $sa := "" -}}
{{- if $w.workerProfile -}}
  {{- $p := index $profiles $w.workerProfile -}}
  {{- if $p -}}{{- $sa = $p.serviceAccountName -}}{{- end -}}
{{- end }}
      - id: {{ required "runtime.workspaceId or runtime.workspaces[].id required" $w.id | quote }}
        provider: {{ default "claude" $w.provider }}
        agentName: {{ default "multica-cluster" $w.agentName }}
        runtimeImage: {{ default (include "multica.runtimeImage" $) $w.runtimeImage | quote }}
        pvcSize: {{ default $.Values.runtime.controller.workdir.size "5Gi" | quote }}
        storageClass: {{ default $.Values.runtime.controller.workdir.storageClass "" | quote }}
        serviceAccountName: {{ $sa | quote }}
{{- end }}
    imagePullSecret: {{ .Values.image.pullSecret | quote }}
    {{- if .Values.runtime.repocache.enabled }}
    # When the in-cluster repo cache is enabled, the controller mounts the
    # shared PVC read-only on every worker Job pod and emits a per-task
    # gitconfig ConfigMap whose url.<base>.insteadOf rewrites convert the
    # agent's plain `git clone <origin-url>` into a sub-second local file://
    # clone. Disabling this falls back to direct origin clones; the worker
    # itself doesn't need to change either way.
    repoCache:
      enabled: true
      pvcName: multica-repocache-repos
      mountPath: /repos
    {{- end }}
    {{- if .Values.runtime.githubTokenSecretName }}
    # Cluster-wide GitHub PAT for the `gh` CLI baked into the runtime image.
    # Optional — when unset, no GH_TOKEN env var is added to worker pods and
    # `gh` simply can't authenticate. The Secret is created out-of-band; the
    # chart never templates a token value.
    githubToken:
      secretName: {{ .Values.runtime.githubTokenSecretName | quote }}
      secretKey: {{ .Values.runtime.githubTokenSecretKey | quote }}
    {{- end }}
    {{- if .Values.runtime.claudeBroker.enabled }}
    # When the broker is enabled, the controller wires worker Jobs to inject
    # CLAUDE_CODE_OAUTH_TOKEN from the broker's access-token Secret via
    # secretKeyRef. The legacy claude-oauth-secret expansion + apiKeyHelper
    # ConfigMap paths are dropped — apiKeyHelper is x-api-key auth and
    # rejected OAuth tokens.
    claudeBroker:
      enabled: true
      accessTokenSecret: {{ .Values.runtime.claudeBroker.accessTokenSecret | quote }}
      secretKey: access_token
    {{- end }}
{{- end }}
