{{- if and .Values.runtime.enabled (eq .Values.runtime.mode "controller") .Values.runtime.claudeBroker.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: multica-claude-broker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "claude-broker" "ctx" .) | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "multica.componentSelector" (dict "name" "claude-broker" "ctx" .) | nindent 4 }}
  ports:
    - { name: admin,   port: 8080, targetPort: admin,   protocol: TCP }
    - { name: metrics, port: 9090, targetPort: metrics, protocol: TCP }
{{- end }}
