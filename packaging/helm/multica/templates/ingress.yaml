{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
  annotations:
    # WS upgrade — most nginx-ingress versions handle this transparently,
    # but explicit timeouts help long-lived daemon WS connections survive.
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.hostname }}
      secretName: {{ .Values.ingress.tls.secretName }}
  {{- end }}
  rules:
    - host: {{ .Values.hostname }}
      http:
        paths:
          # Backend paths — must come before the catch-all "/" rule.
          # These are the paths the Next.js dev rewrites would otherwise proxy,
          # routed straight to the backend Service in production.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          # Web (Next.js) catch-all.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-web
                port:
                  number: 3000
{{- end }}
