{{- if .Values.platform.enabled }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace .Values.platform.backend.jwtSecretName) }}
{{- $jwt := "" }}
{{- if $existing }}
  {{- $jwt = index $existing.data "jwt" | b64dec }}
{{- else }}
  {{- $jwt = randAlphaNum 64 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.platform.backend.jwtSecretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "backend" "ctx" .) | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  jwt: {{ $jwt | quote }}
{{- end }}
