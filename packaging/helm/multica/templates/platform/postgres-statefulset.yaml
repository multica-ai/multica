{{- if and .Values.platform.enabled .Values.platform.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: multica-postgres
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "postgres" "ctx" .) | nindent 4 }}
spec:
  serviceName: multica-postgres
  replicas: 1
  selector:
    matchLabels:
      {{- include "multica.componentSelector" (dict "name" "postgres" "ctx" .) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "multica.componentLabels" (dict "name" "postgres" "ctx" .) | nindent 8 }}
    spec:
      imagePullSecrets:
        - name: {{ .Values.image.pullSecret }}
      containers:
        - name: postgres
          image: {{ include "multica.image" (dict "key" "postgres" "ctx" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_DB
              value: {{ .Values.platform.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.platform.postgres.user | quote }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platform.postgres.secretName }}
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.platform.postgres.user }}", "-d", "{{ .Values.platform.postgres.database }}"]
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "{{ .Values.platform.postgres.user }}", "-d", "{{ .Values.platform.postgres.database }}"]
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            {{- toYaml .Values.platform.postgres.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- with .Values.platform.postgres.storageClass }}
        storageClassName: {{ . | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.platform.postgres.size }}
{{- end }}
