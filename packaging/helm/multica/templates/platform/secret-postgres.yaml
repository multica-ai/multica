{{- if and .Values.platform.enabled .Values.platform.postgres.enabled }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace .Values.platform.postgres.secretName) }}
{{- $pw := "" }}
{{- if $existing }}
  {{- $pw = index $existing.data "password" | b64dec }}
{{- else }}
  {{- $pw = randAlphaNum 32 }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.platform.postgres.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "postgres" "ctx" .) | nindent 4 }}
  annotations:
    "helm.sh/resource-policy": keep
type: Opaque
stringData:
  password: {{ $pw | quote }}
{{- end }}
