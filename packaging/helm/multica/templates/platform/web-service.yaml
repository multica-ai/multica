{{- if .Values.platform.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: multica-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "web" "ctx" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  selector:
    {{- include "multica.componentSelector" (dict "name" "web" "ctx" .) | nindent 4 }}
{{- end }}
