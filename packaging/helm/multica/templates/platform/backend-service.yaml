{{- if .Values.platform.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: multica-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.componentLabels" (dict "name" "backend" "ctx" .) | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  selector:
    {{- include "multica.componentSelector" (dict "name" "backend" "ctx" .) | nindent 4 }}
{{- end }}
