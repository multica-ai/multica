{{- if and .Values.ingress.enabled .Values.ingress.local.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: multica-local
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "multica.labels" . | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.local.hostname }}
      http:
        paths:
          # Mirror the main ingress's backend paths so the .local URL has the
          # same routing behavior as the public hostname.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: multica-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: multica-web
                port:
                  number: 3000
{{- end }}
